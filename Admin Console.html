<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOS Shopping - แผงควบคุมอุตสาหกรรมหลังบ้าน</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
          }
        }
      }
    }
  </script>

  <style>
    :root { 
      --color-primary: #2563eb; 
      --color-secondary: #4f46e5; 
    }
    * { 
      font-family: 'Kanit', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      box-sizing: border-box;
    }
    html, body { 
      min-height: 100%; 
      margin: 0; 
      background-color: #0f172a; 
      color: #e2e8f0;
    }
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .custom-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
    }
    .industrial-border {
      border: 1px solid rgba(51, 65, 85, 0.5);
    }
    .led-glow-green {
      box-shadow: 0 0 8px #10b981;
    }
    .led-glow-amber {
      box-shadow: 0 0 8px #f59e0b;
    }
  </style>
 </head>
 <body class="h-full antialiased selection:bg-sky-900 selection:text-sky-100">

  <div id="initial-loader" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-all duration-300">
    <div class="text-center">
      <div class="relative w-16 h-16 mx-auto mb-5">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-slate-800 border-t-sky-500"></div>
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full led-glow-green animate-pulse"></div>
        </div>
      </div>
      <p class="text-sky-400 text-xs font-bold tracking-wider uppercase">TOS INDUSTRIAL CONTROLLER v4.0</p>
      <p class="text-slate-500 mt-2 text-[11px]">กำลังตรวจสอบสิทธิ์และเชื่อมต่อช่องสัญญาณข้อมูล...</p>
    </div>
  </div>
  
  <div id="app" class="h-full w-full overflow-hidden relative flex"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
      getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, query, where, getDocs, runTransaction 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { 
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const _0xdbKey = [
      "QUl6YVN5QnhWazBMQlg5UkNzOXYzRXNNUDF5SnNpR3ItYmpwb3Jz", 
      "a2std2ViLTdkMDJiLmZpcmViYXNlYXBwLmNvbQ==",             
      "a2std2ViLTdkMDJi",                                     
      "a2std2ViLTdkMDJiLmZpcmViYXNlc3RvcmFnZS5hcHA=",         
      "ODY2ODE4NTI4MjAw",                                     
      "MTo4NjY4MTg1MjgyMDA6d2ViOmViMmRmMzhjNDhmY2UyNjVmZmU2ZmQ=", 
      "Ry1SM0cxWDRSNzZC"                                      
    ];

    const firebaseConfig = {
      apiKey: atob(_0xdbKey[0]),
      authDomain: atob(_0xdbKey[1]),
      projectId: atob(_0xdbKey[2]),
      storageBucket: _0xdbKey[3] ? atob(_0xdbKey[3]) : "",
      messagingSenderId: atob(_0xdbKey[4]),
      appId: atob(_0xdbKey[5]),
      measurementId: atob(_0xdbKey[6])
    };

    const appInstance = initializeApp(firebaseConfig);
    const db = getFirestore(appInstance);
    const auth = getAuth(appInstance);

    // ==========================================
    // STATE ENGINE
    // ==========================================
    let isAdmin = false;
    let adminTab = 'users';
    let adminUserSearch = ""; 
    let adminProductTab = '1'; 
    let adminProductPage = 1;
    const ITEMS_PER_PAGE = 10;

    let publicData = {
      configs: [],
      banners: [],
      galleries: [],
      menuIcons: [],
      products: []
    };

    let adminUsersData = [];
    let rawUsersEng = [];
    let adminWithdrawalsData = [];
    let adminSpecialAssignData = [];
    let adminSpecialTemplatesData = [];
    let allUserOrdersData = [];

    let activeListeners = {
      configs: null, banners: null, galleries: null, menuIcons: null, products: null,
      adminUsers: null, adminWithdrawals: null, adminSpecialAssigns: null, adminSpecialTemplates: null, allOrders: null
    };

    const $ = id => document.getElementById(id);
    const getUsers = () => adminUsersData;
    const getProducts = () => publicData.products;
    const getSpecialTemplates = () => adminSpecialTemplatesData;
    const getSpecialAssignments = () => adminSpecialAssignData;
    const getWithdrawals = () => adminWithdrawalsData;
    const getBanners = () => publicData.banners;
    const getGallery = () => publicData.galleries;
    const getMenuIcons = () => publicData.menuIcons;

    (function initCachedStyles() {
      const cached = localStorage.getItem('tos_cached_config');
      if (cached) {
        try {
          const cfg = JSON.parse(cached);
          const p = cfg.themePrimary || '#2563eb';
          const s = cfg.themeSecondary || '#4f46e5';
          document.documentElement.style.setProperty('--color-primary', p);
          document.documentElement.style.setProperty('--color-secondary', s);
          
          let styleEl = document.getElementById('dynamic-theme-style');
          if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'dynamic-theme-style';
            document.head.appendChild(styleEl);
          }
          styleEl.innerHTML = `
            :root {
              --color-primary: ${p} !important;
              --color-secondary: ${s} !important;
            }
            .text-sky-400 { color: ${s} !important; }
            .bg-sky-600 { background-color: ${s} !important; }
            .bg-sky-500 { background-color: ${s} !important; }
            .border-sky-500 { border-color: ${s} !important; }
            .border-sky-500\\/30 { border-color: ${s}4d !important; }
            .text-sky-500 { color: ${s} !important; }
            .bg-sky-500\\/10 { background-color: ${s}1a !important; }
            .text-primary { color: ${p} !important; }
            .bg-primary { background-color: ${p} !important; }
            .border-primary { border-color: ${p} !important; }
          `;
        } catch (e) {}
      }
    })();

    const getConfig = () => {
      if (publicData.configs && publicData.configs.length > 0) {
        return publicData.configs[0];
      }
      const cached = localStorage.getItem('tos_cached_config');
      if (cached) {
        try {
          return JSON.parse(cached);
        } catch (e) {}
      }
      return {
        themePrimary: '',
        themeSecondary: '',
        inviteCode: '',
        logoUrl: '',
        loginBgUrl: '',
        userBgUrl: '',
        marqueeText: '',
        tabTitle: '',
        tabFaviconUrl: '',
        supportedBanks: 'KBank,SCB,BBL,KTB,Krungsri,GSB,TrueMoney'
      };
    };

    const getInviteCode = () => { const c = getConfig(); return String(c.inviteCode || '').trim(); };
    const getLogoUrl = () => { const c = getConfig(); return c.logoUrl || ''; };
    const getMarqueeText = () => { const c = getConfig(); return c.marqueeText || ''; };
    const getLineQrUrl = () => { const c = getConfig(); return c.lineQrUrl || ''; };
    const getLineId = () => { const c = getConfig(); return c.lineId || ''; };
    const getTopupQrUrl = () => { const c = getConfig(); return c.topupQrUrl || ''; };
    const getTopupAccount = () => { const c = getConfig(); return c.topupAccount || ''; };
    const getTabTitle = () => { const c = getConfig(); return c.tabTitle || ''; };
    const getTabFavicon = () => { const c = getConfig(); return c.tabFaviconUrl || ''; };

    function genId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    function showToast(msg, type='success') {
      const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#1e293b',
        color: '#f8fafc',
        iconColor: type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#0284c7'),
        didOpen: (toast) => {
          toast.addEventListener('mouseenter', Swal.stopTimer)
          toast.addEventListener('mouseleave', Swal.resumeTimer)
        }
      });

      Toast.fire({
        icon: type === 'success' ? 'success' : (type === 'error' ? 'error' : 'info'),
        title: msg
      });
    }

    function showModal(content) {
      let m = $('modal-overlay');
      if (!m) { 
        m = document.createElement('div'); m.id = 'modal-overlay'; 
        m.addEventListener('click', function(e) { if (e.target === m) closeModal(); });
        document.body.appendChild(m); 
      }
      m.className = 'fixed inset-0 bg-slate-950/70 z-[100] flex items-center justify-center p-4 cursor-pointer backdrop-blur-md';
      m.innerHTML = `
        <div class="bg-slate-900 text-slate-100 rounded-2xl p-6 w-full max-w-md modal-anim shadow-2xl border border-slate-700 max-h-[90vh] overflow-y-auto cursor-auto" onclick="event.stopPropagation()">
          ${content}
        </div>`;
      lucide.createIcons();
    }
    function closeModal() { const m = $('modal-overlay'); if (m) m.remove(); }

    function applyTheme(primary, secondary) {
      const p = primary || '#2563eb';
      const s = secondary || '#4f46e5';
      document.documentElement.style.setProperty('--color-primary', p);
      document.documentElement.style.setProperty('--color-secondary', s);

      let styleEl = document.getElementById('dynamic-theme-style');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynamic-theme-style';
        document.head.appendChild(styleEl);
      }
      styleEl.innerHTML = `
        :root {
          --color-primary: ${p} !important;
          --color-secondary: ${s} !important;
        }
        .text-sky-400 { color: ${s} !important; }
        .bg-sky-600 { background-color: ${s} !important; }
        .bg-sky-500 { background-color: ${s} !important; }
        .border-sky-500 { border-color: ${s} !important; }
        .border-sky-500\\/30 { border-color: ${s}4d !important; }
        .text-sky-500 { color: ${s} !important; }
        .bg-sky-500\\/10 { background-color: ${s}1a !important; }
        .text-primary { color: ${p} !important; }
        .bg-primary { background-color: ${p} !important; }
        .border-primary { border-color: ${p} !important; }
      `;
    }

    const getCol = (type) => {
      const map = { 
        user: 'users', 
        order: 'orders', 
        product: 'products', 
        withdrawal: 'withdrawals', 
        config: 'configs', 
        banner: 'banners', 
        gallery: 'galleries', 
        menuIcon: 'menu_icons', 
        special_template: 'special_templates', 
        special_assignments: 'special_assignments' 
      };
      return map[type] || 'misc';
    };

    const windowDataSdk = {
      create: async function(obj) {
        if(!obj.id) obj.id = genId();
        obj.__backendId = obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, obj.id), obj);
        return {isOk: true};
      },
      update: async function(obj) {
        const backendId = obj.__backendId || obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, backendId), obj);
        return {isOk: true};
      },
      delete: async function(obj) {
        const col = getCol(obj.type);
        await deleteDoc(doc(db, col, obj.__backendId || obj.id));
        return {isOk: true};
      }
    };

    function dismissAdminPreloader() {
      const loader = $('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
    }

    setTimeout(() => {
      dismissAdminPreloader();
    }, 3500);

    function updateHeaderStats() {
      const elMembers = $('stat-total-members');
      const elOrders = $('stat-total-orders');
      const elProducts = $('stat-total-products');
      
      if (elMembers) elMembers.innerText = `${adminUsersData.length} บัญชี`;
      if (elOrders) elOrders.innerText = `${allUserOrdersData.length} รายการ`;
      if (elProducts) elProducts.innerText = `${publicData.products.length} ชิ้น`;
    }

    function renderPagination(totalItems, currentPage, callbackName) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
      if (totalPages <= 1) return '';

      let html = `<div class="flex items-center justify-center gap-2 mt-6">`;
      for (let i = 1; i <= totalPages; i++) {
        const activeClass = i === currentPage ? 'bg-sky-500 text-slate-950 font-bold text-xs' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 text-xs';
        html += `<button onclick="${callbackName}(${i})" class="px-2.5 py-1.5 rounded transition ${activeClass}">${i}</button>`;
      }
      html += `</div>`;
      return html;
    }

    async function saveConfigToFirebase(payload) {
      const docId = "system_config";
      payload.id = docId;
      payload.__backendId = docId;
      const cleanData = { ...payload };
      delete cleanData.__collection; 
      await setDoc(doc(db, "configs", docId), cleanData);
    }

    function startPublicSubscriptions() {
      activeListeners.configs = onSnapshot(doc(db, "configs", "system_config"), (docSnap) => {
        if (docSnap.exists()) {
          const cfgData = { ...docSnap.data(), __backendId: docSnap.id };
          publicData.configs = [cfgData];
          localStorage.setItem('tos_cached_config', JSON.stringify(cfgData));
          applyTheme(cfgData.themePrimary, cfgData.themeSecondary);
        }
        dismissAdminPreloader();
        updateHeaderStats();
      }, (err) => {
        console.warn("ข้อผิดพลาดในการโหลดข้อกำหนดระบบ: ", err);
        dismissAdminPreloader();
      });

      activeListeners.banners = onSnapshot(collection(db, "banners"), (snapshot) => {
        let banners = [];
        snapshot.forEach(d => banners.push({ ...d.data(), __backendId: d.id }));
        publicData.banners = banners;
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.galleries = onSnapshot(collection(db, "galleries"), (snapshot) => {
        let galleries = [];
        snapshot.forEach(d => galleries.push({ ...d.data(), __backendId: d.id }));
        publicData.galleries = galleries;
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.menuIcons = onSnapshot(collection(db, "menu_icons"), (snapshot) => {
        let icons = [];
        snapshot.forEach(d => icons.push({ ...d.data(), __backendId: d.id }));
        publicData.menuIcons = icons.sort((a,b) => parseInt(a.menuOrder||0) - parseInt(b.menuOrder||0));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.products = onSnapshot(collection(db, "products"), (snapshot) => {
        let prods = [];
        snapshot.forEach(d => prods.push({ ...d.data(), __backendId: d.id }));
        publicData.products = prods.sort((a,b) => parseInt(a.productOrder||0) - parseInt(b.productOrder||0));
        updateHeaderStats();
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));
    }

    function startAdminSubscriptions() {
      stopAdminSubscriptions();
      
      activeListeners.adminUsers = onSnapshot(collection(db, "users"), (snapshot) => {
        rawUsersEng = [];
        snapshot.forEach(d => rawUsersEng.push({ ...d.data(), id: d.id, __backendId: d.id }));
        adminUsersData = rawUsersEng;
        updateHeaderStats();
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.adminWithdrawals = onSnapshot(collection(db, "withdrawals"), (snapshot) => {
        adminWithdrawalsData = [];
        snapshot.forEach(d => adminWithdrawalsData.push({ ...d.data(), __backendId: d.id }));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.adminSpecialAssigns = onSnapshot(collection(db, "special_assignments"), (snapshot) => {
        adminSpecialAssignData = [];
        snapshot.forEach(d => adminSpecialAssignData.push({ ...d.data(), __backendId: d.id }));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.adminSpecialTemplates = onSnapshot(collection(db, "special_templates"), (snapshot) => {
        adminSpecialTemplatesData = [];
        snapshot.forEach(d => adminSpecialTemplatesData.push({ ...d.data(), __backendId: d.id }));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.allOrders = onSnapshot(collection(db, "orders"), (snapshot) => {
        allUserOrdersData = [];
        snapshot.forEach(d => allUserOrdersData.push({ ...d.data(), __backendId: d.id }));
        updateHeaderStats();
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));
    }

    function stopAdminSubscriptions() {
      if (activeListeners.adminUsers) { activeListeners.adminUsers(); activeListeners.adminUsers = null; }
      if (activeListeners.adminWithdrawals) { activeListeners.adminWithdrawals(); activeListeners.adminWithdrawals = null; }
      if (activeListeners.adminSpecialAssigns) { activeListeners.adminSpecialAssigns(); activeListeners.adminSpecialAssigns = null; }
      if (activeListeners.adminSpecialTemplates) { activeListeners.adminSpecialTemplates(); activeListeners.adminSpecialTemplates = null; }
      if (activeListeners.allOrders) { activeListeners.allOrders(); activeListeners.allOrders = null; }
    }

    // ==========================================
    // ADMIN AUTH UI
    // ==========================================
    function renderAdminLogin() {
      const app = $('app');
      const logoUrl = getLogoUrl();
      const logoHtml = logoUrl ? `<img src="${logoUrl}" class="w-16 h-16 mx-auto object-cover rounded-xl border border-slate-700 shadow-sm mb-3">` : `<span class="text-4xl">🏭</span>`;
      app.innerHTML = `
      <div class="min-h-full w-full flex items-center justify-center p-4 bg-slate-950">
        <div class="w-full max-w-sm bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl">
          <div class="text-center mb-6">
            ${logoHtml}
            <h2 class="text-sky-400 font-bold text-base mt-4 tracking-wider">แผงควบคุมอุตสาหกรรม TOS</h2>
            <p class="text-slate-500 text-[10px] mt-1 font-mono">INDUSTRIAL MONITOR CENTER</p>
          </div>
          <div class="space-y-4">
            <div>
              <label class="text-[11px] text-slate-400 font-bold block mb-1 uppercase">สิทธิ์อีเมลผู้ดูแลระบบ</label>
              <input id="inp-admin-email" type="email" class="w-full px-4 py-2.5 rounded bg-slate-950 text-slate-100 placeholder-slate-600 outline-none border border-slate-800 focus:border-sky-500 text-sm" placeholder="username@admin.com">
            </div>
            <div>
              <label class="text-[11px] text-slate-400 font-bold block mb-1 uppercase">รหัสผ่านประมวลผล</label>
              <input id="inp-admin-pass" type="password" onkeydown="if(event.key === 'Enter') doAdminLogin()" class="w-full px-4 py-2.5 rounded bg-slate-950 text-slate-100 placeholder-slate-600 outline-none border border-slate-800 focus:border-sky-500 text-sm" placeholder="••••••••">
            </div>
            <button onclick="doAdminLogin()" id="btn-admin-login" class="w-full py-3 bg-sky-600 hover:bg-sky-500 text-slate-950 font-bold rounded shadow transition text-xs uppercase tracking-wider">เชื่อมต่อเข้าสู่ระบบ</button>
          </div>
        </div>
      </div>`;
    }

    async function doAdminLogin() {
      const email = $('inp-admin-email').value.trim();
      const password = $('inp-admin-pass').value.trim();
      if (!email || !password) return showToast('กรุณากรอกข้อมูลเพื่อระบุตัวตนให้ครบถ้วน','error');
      if (!email.endsWith('@admin.com')) return showToast('อีเมลต้องลงท้ายด้วย @admin.com เท่านั้น','error');

      const btn = $('btn-admin-login');
      btn.disabled = true; btn.textContent = 'กำลังยืนยันสิทธิ์...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('เชื่อมต่อบอร์ดควบคุมแอดมินสำเร็จ');
      } catch (err) {
        btn.disabled = false; btn.textContent = 'เชื่อมต่อเข้าสู่ระบบ';
        showToast(`สิทธิ์การเข้าใช้งานถูกปฏิเสธ: ${err.message}`,'error');
      }
    }

    async function exitAdmin() { 
      isAdmin = false; 
      stopAdminSubscriptions();
      await signOut(auth);
    }

    // ==========================================
    // ADMIN PANEL LAYOUT
    // ==========================================
    function renderAdmin() {
      const sidebarMenu = [
        {id:'users', icon:'users', label:'ฐานข้อมูลสมาชิก', type:'main'},
        {id:'orders', icon:'list', label:'ประวัติออเดอร์ทั้งหมด', type:'main'},
        {id:'special', icon:'star', label:'บอร์ดออเดอร์พิเศษ (ล็อกคิว)', type:'main'},
        {id:'products_1', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 1', type:'sub'},
        {id:'products_2', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 2', type:'sub'},
        {id:'products_3', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 3', type:'sub'},
        {id:'products_4', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 4', type:'sub'},
        {id:'products_5', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 5', type:'sub'},
        {id:'products_6', icon:'chevron-right', label:'เซกเตอร์สินค้า VIP 6', type:'sub'},
        {id:'products_fixturn', icon:'chevron-right', label:'เซกเตอร์ซ่อมเทิร์น', type:'sub'},
        {id:'products_allowwd', icon:'chevron-right', label:'เซกเตอร์ปลดล็อกการถอน', type:'sub'},
        {id:'withdrawals', icon:'banknote', label:`บิลรับฝาก / คำขอถอน`, type:'main'},

    function promptUserBalanceUpdate(bid, type) {
      const label = type === 'deposit' ? 'เติมเครดิต' : 'หักเครดิต';
      const promptText = type === 'deposit' ? 'ระบุจำนวนเครดิตที่ต้องการเติม:' : 'ระบุจำนวนเครดิตที่ต้องการหักออก:';
      const amtStr = prompt(promptText);
      const amount = parseFloat(amtStr);
      if (isNaN(amount) || amount <= 0) return alert('จำนวนเครดิตไม่ถูกต้อง');
      
      const multiplier = type === 'deposit' ? 1 : -1;
      adjustUserBalanceDirectly(bid, amount * multiplier);
    }

    async function adjustUserBalanceDirectly(bid, adjustAmount) {
      const u = adminUsersData.find(d => d.__backendId === bid);
      let userDocRef = doc(db, "users", u.id);
      let wdCol = collection(db, "withdrawals");
      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          if (!snap.exists()) return;
          const currentCredit = snap.data().credit || 0;

          const updatePayload = {
            credit: Math.max(0, currentCredit + adjustAmount)
          };

          transaction.update(userDocRef, updatePayload);

          const newWdRef = doc(wdCol);
          transaction.set(newWdRef, {
            type: 'withdrawal',
            id: newWdRef.id,
            userId: u.id,
            username: snap.data().username || 'User',
            amount: Math.abs(adjustAmount),
            status: adjustAmount > 0 ? 'deposit' : 'rejected',
            createdAt: new Date().toISOString()
          });
        });
        showToast('แก้ไขข้อมูลการปรับปรุงเครดิตบัญชีเรียบร้อย');
        closeModal();
        renderAdminTab();
      } catch (err) {
        showToast('ล้มเหลวในการปรับปรุงเครดิตสมาชิก', 'error');
      }
    }

    async function saveAdminUser(bid) {

            firstName: $('eu-fname').value.trim(),
            lastName: $('eu-lname').value.trim(),

          return username.toLowerCase().includes(q) || u.phone.includes(q);

    function filterEditAssignUsers(queryVal) {
      const select = $('sa-edit-user'); if(!select) return;
      const q = queryVal.toLowerCase().trim();
      select.innerHTML = adminUsersData
        .filter(u => {
          const username = u.username || '';
          return username.toLowerCase().includes(q) || u.phone.includes(q);
        })
        .map(u => {
          const username = u.username || 'User';
          return `<option value="${u.id}">${username} (${u.phone})</option>`;
        })
        .join('');
    }

    async function doUpdateAssignedS(bid, imgUrl) {
      const s = adminSpecialAssignData.find(d => d.__backendId === bid); if(!s) return;
      const name = $('sa-edit-name').value.trim();
      const price = parseFloat($('sa-edit-price').value) || 0;
      const comm = parseFloat($('sa-edit-comm').value) || 0;
      const targetUser = $('sa-edit-user').value;
      const targetIndex = parseInt($('sa-edit-idx').value) || 1;
      if (!name) return showToast('กรุณาระบุชื่อสินค้า', 'error');
      if (!targetUser) return showToast('กรุณาระบุสมาชิกรับงานปลายทาง', 'error');
      
      await windowDataSdk.update({
        ...s, productName: name, productPrice: price, commission: comm,
        productImage: imgUrl, targetUser: targetUser, targetIndex: targetIndex
      });
      closeModal();
      renderAdminTab();
      showToast('ปรับปรุงอัปเดตออเดอร์พิเศษสำเร็จ');
    }

    async function approveWithdraw(bid) { const w = adminWithdrawalsData.find(d => d.__backendId === bid); w.status = 'approved'; await windowDataSdk.update(w); renderAdminTab(); }
    
    async function rejectWithdraw(bid) { 
      const w = adminWithdrawalsData.find(d => d.__backendId === bid); 
      let userDocRef = doc(db, "users", w.userId);
      const wdDocRef = doc(db, getCol('withdrawal'), bid);

      try {
        await runTransaction(db, async (transaction) => {
          const uSnap = await transaction.get(userDocRef);
          if (uSnap.exists()) {
            const currentCredit = uSnap.data().credit || 0;
            const refundedVal = currentCredit + (w.amount || 0);
            transaction.update(userDocRef, { credit: refundedVal });
          }
          transaction.update(wdDocRef, { status: 'rejected' });
        });
        showToast('ปฏิเสธการถอนเงินเรียบร้อย ยอดเครดิตคืนเข้าพอร์ตสมาชิกแล้ว');
        renderAdminTab();
      } catch (err) {
        showToast('การส่งผ่านข้อมูลธุรกรรมล้มเหลว', 'error');
      }
    }

    async function deleteWithdrawal(bid) {
      if (confirm('คุณต้องการทำลายประวัติใบบันทึกธุรกรรมถอนเงินนี้จากหลังบ้าน?')) {
        try {
          await deleteDoc(doc(db, "withdrawals", bid));
          showToast('ทำลายข้อมูลบิลเรียบร้อย');

          showToast('ความผิดพลาดจากฝั่งเครื่องแม่ข่าย: ' + err.message, 'error');
        }
      }
    }

    async function saveAdminTheme() {
      const p = ($('cfg-theme-p-text') ? $('cfg-theme-p-text').value.trim() : '') || ($('cfg-theme-p-picker') ? $('cfg-theme-p-picker').value : '#2563eb');
      const s = ($('cfg-theme-s-text') ? $('cfg-theme-s-text').value.trim() : '') || ($('cfg-theme-s-picker') ? $('cfg-theme-s-picker').value : '#4f46e5');
      let config = getConfig() || {};
      
      const updatePayload = {
        ...config,
        themePrimary: p,
        themeSecondary: s
      };
      
      publicData.configs = [updatePayload];
      localStorage.setItem('tos_cached_config', JSON.stringify(updatePayload));
      applyTheme(p, s);
      await saveConfigToFirebase(updatePayload); 
      showToast('ปรับปรุงเฉดสีแอปและซิงค์ผู้ใช้เรียบร้อยแล้ว', 'success');
      renderAdminTab();
    }

    async function saveAdminSettings(type) {
      let config = getConfig() || {};
      const updatePayload = { 
        ...config,
        type: 'config',
        id: 'system_config'
      };

      if (type === 'logo') {
        updatePayload.logoUrl = $('cfg-logo').value.trim();
      }
      else if (type === 'bgs') { 
        updatePayload.loginBgUrl = $('cfg-login-bg').value.trim(); 
        updatePayload.userBgUrl = $('cfg-user-bg').value.trim(); 
      }
      else if (type === 'invite') { 
        const newInvite = $('cfg-invite').value.trim(); 
        if (!newInvite) return showToast('กรุณาระบุพารามิเตอร์คีย์รหัสเชิญ', 'error'); 
        updatePayload.inviteCode = newInvite; 
      }
      else if (type === 'marquee') {
        updatePayload.marqueeText = $('cfg-marquee').value.trim();
      }
      else if (type === 'line') { 
        updatePayload.lineQrUrl = $('cfg-line-qr').value.trim(); 
        updatePayload.lineId = $('cfg-line-id').value.trim(); 
      }
      else if (type === 'topup_banks') { 
        updatePayload.topupQrUrl = $('cfg-topup-qr').value.trim(); 
        updatePayload.topupAccount = $('cfg-topup-acc').value.trim(); 
        updatePayload.supportedBanks = $('cfg-banks').value.trim();
      }
      else if (type === 'tab_config') { 
        updatePayload.tabTitle = $('cfg-tab-title').value.trim(); 
        updatePayload.tabFaviconUrl = $('cfg-tab-favicon').value.trim(); 
      }

      publicData.configs = [updatePayload];
      localStorage.setItem('tos_cached_config', JSON.stringify(updatePayload));
      await saveConfigToFirebase(updatePayload); 
      showToast('บันทึกปรับปรุงแก้ไขการตั้งค่าสำเร็จ', 'success'); 
      renderAdminTab();
    }

      if (user && user.email.endsWith('@admin.com')) {
        isAdmin = true;
        adminTab = sessionStorage.getItem('tos_admin_tab') || 'users'; 
        startAdminSubscriptions();
        renderAdmin();
      } else {
        isAdmin = false;
        renderAdminLogin();
      }
    });
