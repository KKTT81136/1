<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOS Shopping - Admin Console</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
          }
        }
      }
    }
  </script>

  <style>
    :root { 
      --color-primary: #1e40af; 
      --color-secondary: #3b82f6; 
    }
    * { 
      font-family: 'Kanit', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      box-sizing: border-box;
    }
    html, body { 
      min-height: 100%; 
      margin: 0; 
      background-color: #f1f5f9; 
      color: #334155;
    }
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .custom-shadow {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    }
  </style>
 </head>
 <body class="h-full antialiased selection:bg-blue-100 selection:text-blue-900">

  <div id="initial-loader" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
      <p class="text-slate-500 mt-4 text-sm font-semibold">กำลังเชื่อมต่อแดชบอร์ดแอดมิน...</p>
    </div>
  </div>
  
  <div id="app" class="h-full w-full overflow-hidden relative flex"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
      getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, query, where, getDocs, runTransaction 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { 
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const _0xdbKey = [
      "QUl6YVN5QnhWazBMQlg5UkNzOXYzRXNNUDF5SnNpR3ItYmpwb3Jz", 
      "a2std2ViLTdkMDJiLmZpcmViYXNlYXBwLmNvbQ==",             
      "a2std2ViLTdkMDJi",                                     
      "a2std2ViLTdkMDJiLmZpcmViYXNlc3RvcmFnZS5hcHA=",         
      "ODY2ODE4NTI4MjAw",                                     
      "MTo4NjY4MTg1MjgyMDA6d2ViOmViMmRmMzhjNDhmY2UyNjVmZmU2ZmQ=", 
      "Ry1SM0cxWDRSNzZC"                                      
    ];

    const firebaseConfig = {
      apiKey: atob(_0xdbKey[0]),
      authDomain: atob(_0xdbKey[1]),
      projectId: atob(_0xdbKey[2]),
      storageBucket: _0xdbKey[3] ? atob(_0xdbKey[3]) : "",
      messagingSenderId: atob(_0xdbKey[4]),
      appId: atob(_0xdbKey[5]),
      measurementId: atob(_0xdbKey[6])
    };

    const appInstance = initializeApp(firebaseConfig);
    const db = getFirestore(appInstance);
    const auth = getAuth(appInstance);

    // ==========================================
    // STATE ENGINE
    // ==========================================
    let isAdmin = false;
    let adminTab = 'users';
    let adminUserSearch = ""; 
    let adminProductTab = '1'; 
    let adminProductPage = 1;
    const ITEMS_PER_PAGE = 10;

    let publicData = {
      configs: [],
      banners: [],
      galleries: [],
      menuIcons: [],
      products: []
    };

    let adminUsersData = [];
    let rawUsersEng = [];
    let rawUsersThai = [];

    let adminWithdrawalsData = [];
    let rawWdsEng = [];
    let rawWdsThai = [];

    let adminSpecialAssignData = [];
    let adminSpecialTemplatesData = [];
    let allUserOrdersData = [];

    let activeListeners = {
      configs: null, configsThai: null, banners: null, galleries: null, menuIcons: null, products: null,
      adminUsers: null, adminUsersThai: null, adminWithdrawals: null, adminWithdrawalsThai: null, 
      adminSpecialAssigns: null, adminSpecialTemplates: null, allOrders: null
    };

    const $ = id => document.getElementById(id);
    const getUsers = () => adminUsersData;
    const getProducts = () => publicData.products;
    const getSpecialTemplates = () => adminSpecialTemplatesData;
    const getSpecialAssignments = () => adminSpecialAssignData;
    const getWithdrawals = () => adminWithdrawalsData;
    const getBanners = () => publicData.banners;
    const getGallery = () => publicData.galleries;
    const getMenuIcons = () => publicData.menuIcons;
    
    function getField(obj, engKey, thaiKey) {
      if (!obj) return undefined;
      if (obj[engKey] !== undefined) return obj[engKey];
      if (obj[thaiKey] !== undefined) return obj[thaiKey];
      return undefined;
    }

    const getConfig = () => publicData.configs.find(d => d.type === 'config' || d.type === 'การตั้งค่า' || d.พิมพ์ === 'การตั้งค่า') || null;

    const getInviteCode = () => { const c = getConfig(); return String(getField(c, 'inviteCode', 'รหัสเชิญ') || '12345').trim(); };
    const getLogoUrl = () => { const c = getConfig(); return getField(c, 'logoUrl', 'logoUrl') || ''; };
    const getMarqueeText = () => { const c = getConfig(); return getField(c, 'marqueeText', 'ข้อความวิ่ง') || 'ยินดีต้อนรับสู่ระบบ TOS Shopping'; };
    const getLineQrUrl = () => { const c = getConfig(); return getField(c, 'lineQrUrl', 'lineQrUrl') || ''; };
    const getLineId = () => { const c = getConfig(); return getField(c, 'lineId', 'lineId') || ''; };
    const getTopupQrUrl = () => { const c = getConfig(); return getField(c, 'topupQrUrl', 'topupQrUrl') || ''; };
    const getTopupAccount = () => { const c = getConfig(); return getField(c, 'topupAccount', 'topupAccount') || ''; };
    const getTabTitle = () => { const c = getConfig(); return getField(c, 'tabTitle', 'แท็บชื่อเรื่อง') || 'TOS Shopping'; };
    const getTabFavicon = () => { const c = getConfig(); return getField(c, 'tabFaviconUrl', 'tabFaviconUrl') || ''; };

    function genId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    function showToast(msg, type='success') {
      const old = $('toast-container'); if (old) old.remove();
      const colors = { 
        success:'bg-emerald-600 border-emerald-700 text-white', 
        error:'bg-rose-600 border-rose-700 text-white', 
        info:'bg-blue-600 border-blue-700 text-white' 
      };
      const icons = { success:'check-circle', error:'alert-circle', info:'info' };
      const div = document.createElement('div');
      div.id = 'toast-container';
      div.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-[9999] toast-show w-max max-w-[90vw]';
      div.innerHTML = `
        <div class="${colors[type]} px-6 py-3 rounded-2xl shadow-lg border flex items-center gap-3 text-sm font-bold tracking-wide">
          <i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0 text-white"></i>
          <span class="text-white">${msg}</span>
        </div>`;
      document.body.appendChild(div);
      lucide.createIcons();
      setTimeout(() => { if(div) div.remove(); }, 2500);
    }

    function showModal(content) {
      let m = $('modal-overlay');
      if (!m) { 
        m = document.createElement('div'); m.id = 'modal-overlay'; 
        m.addEventListener('click', function(e) { if (e.target === m) closeModal(); });
        document.body.appendChild(m); 
      }
      m.className = 'fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 cursor-pointer backdrop-blur-sm';
      m.innerHTML = `
        <div class="bg-white text-slate-800 rounded-[20px] p-6 w-full max-w-md modal-anim shadow-2xl border border-slate-200 max-h-[90vh] overflow-y-auto cursor-auto" onclick="event.stopPropagation()">
          ${content}
        </div>`;
      lucide.createIcons();
    }
    function closeModal() { const m = $('modal-overlay'); if (m) m.remove(); }

    function applyTheme(primary, secondary) {
      document.documentElement.style.setProperty('--color-primary', primary || '#1e40af');
      document.documentElement.style.setProperty('--color-secondary', secondary || '#3b82f6');
    }

    const getCol = (type) => {
      const map = { 
        user: 'ผู้ใช้', 
        order: 'orders', 
        product: 'products', 
        withdrawal: 'การถอนเงิน', 
        config: 'การกำหนดค่า', 
        banner: 'banners', 
        gallery: 'galleries', 
        menuIcon: 'menu_icons', 
        special_template: 'special_templates', 
        special_assignments: 'special_assignments' 
      };
      return map[type] || 'misc';
    };

    const windowDataSdk = {
      create: async function(obj) {
        if(!obj.id) obj.id = genId();
        obj.__backendId = obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, obj.id), obj);
        return {isOk: true};
      },
      update: async function(obj) {
        const backendId = obj.__backendId || obj.id;
        const col = getCol(obj.type);
        await setDoc(doc(db, col, backendId), obj);
        return {isOk: true};
      },
      delete: async function(obj) {
        const col = getCol(obj.type);
        await deleteDoc(doc(db, col, obj.__backendId || obj.id));
        return {isOk: true};
      }
    };

    function dismissAdminPreloader() {
      const loader = $('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
    }

    function updateHeaderStats() {
      const elMembers = $('stat-total-members');
      const elOrders = $('stat-total-orders');
      const elProducts = $('stat-total-products');
      const elCustomers = $('stat-total-customers');
      
      if (elMembers) elMembers.innerText = `${adminUsersData.length} คน`;
      if (elOrders) elOrders.innerText = `${allUserOrdersData.length} รายการ`;
      if (elProducts) elProducts.innerText = `${publicData.products.length} ชิ้น`;
      if (elCustomers) elCustomers.innerText = `${adminUsersData.length} คน`;
    }

    function renderPagination(totalItems, currentPage, callbackName) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
      if (totalPages <= 1) return '';

      let html = `<div class="flex items-center justify-center gap-2 mt-6">`;
      for (let i = 1; i <= totalPages; i++) {
        const activeClass = i === currentPage ? 'bg-primary text-white font-bold' : 'bg-slate-200 text-slate-700 hover:bg-slate-300';
        html += `<button onclick="${callbackName}(${i})" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition ${activeClass}">${i}</button>`;
      }
      html += `</div>`;
      return html;
    }

    function startPublicSubscriptions() {
      const configHandler = (snapshot) => {
        let configs = [];
        snapshot.forEach(d => configs.push({ ...d.data(), __backendId: d.id }));
        if (configs.length > 0 || publicData.configs.length === 0) {
          publicData.configs = configs;
        }
        
        const cfg = getConfig();
        if (cfg) {
          applyTheme(getField(cfg, 'themePrimary', 'ธีมหลัก'), getField(cfg, 'themeSecondary', 'ธีมรอง'));
        }
        dismissAdminPreloader();
        updateHeaderStats();
      };

      const configErrorHandler = (err) => {
        console.warn("Admin config load error: ", err);
        dismissAdminPreloader();
      };
      
      activeListeners.configs = onSnapshot(collection(db, "configs"), configHandler, configErrorHandler);
      activeListeners.configsThai = onSnapshot(collection(db, "การกำหนดค่า"), configHandler, configErrorHandler);

      activeListeners.banners = onSnapshot(collection(db, "banners"), (snapshot) => {
        let banners = [];
        snapshot.forEach(d => banners.push({ ...d.data(), __backendId: d.id }));
        publicData.banners = banners;
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.galleries = onSnapshot(collection(db, "galleries"), (snapshot) => {
        let galleries = [];
        snapshot.forEach(d => galleries.push({ ...d.data(), __backendId: d.id }));
        publicData.galleries = galleries;
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.menuIcons = onSnapshot(collection(db, "menu_icons"), (snapshot) => {
        let icons = [];
        snapshot.forEach(d => icons.push({ ...d.data(), __backendId: d.id }));
        publicData.menuIcons = icons.sort((a,b) => parseInt(a.menuOrder||0) - parseInt(b.menuOrder||0));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.products = onSnapshot(collection(db, "products"), (snapshot) => {
        let prods = [];
        snapshot.forEach(d => prods.push({ ...d.data(), __backendId: d.id }));
        publicData.products = prods.sort((a,b) => parseInt(a.productOrder||0) - parseInt(b.productOrder||0));
        updateHeaderStats();
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));
    }

    const mergeAndRenderUsers = () => {
      const mergedMap = new Map();
      rawUsersEng.forEach(u => mergedMap.set(u.id, u));
      rawUsersThai.forEach(u => mergedMap.set(u.id, u));
      adminUsersData = Array.from(mergedMap.values());
      updateHeaderStats();
      if($('admin-content')) renderAdminTab();
    };

    const mergeAndRenderWds = () => {
      const mergedMap = new Map();
      rawWdsEng.forEach(w => mergedMap.set(w.id, w));
      rawWdsThai.forEach(w => mergedMap.set(w.id, w));
      adminWithdrawalsData = Array.from(mergedMap.values());
      if($('admin-content')) renderAdminTab();
    };

    function startAdminSubscriptions() {
      stopAdminSubscriptions();
      
      activeListeners.adminUsers = onSnapshot(collection(db, "users"), (snapshot) => {
        rawUsersEng = [];
        snapshot.forEach(d => rawUsersEng.push({ ...d.data(), id: d.id, __backendId: d.id }));
        mergeAndRenderUsers();
      }, (err) => console.warn(err));

      activeListeners.adminUsersThai = onSnapshot(collection(db, "ผู้ใช้"), (snapshot) => {
        rawUsersThai = [];
        snapshot.forEach(d => rawUsersThai.push({ ...d.data(), id: d.id, __backendId: d.id }));
        mergeAndRenderUsers();
      }, (err) => console.warn(err));

      activeListeners.adminWithdrawals = onSnapshot(collection(db, "withdrawals"), (snapshot) => {
        rawWdsEng = [];
        snapshot.forEach(d => rawWdsEng.push({ ...d.data(), __backendId: d.id }));
        mergeAndRenderWds();
      }, (err) => console.warn(err));

      activeListeners.adminWithdrawalsThai = onSnapshot(collection(db, "การถอนเงิน"), (snapshot) => {
        rawWdsThai = [];
        snapshot.forEach(d => rawWdsThai.push({ ...d.data(), __backendId: d.id }));
        mergeAndRenderWds();
      }, (err) => console.warn(err));

      activeListeners.adminSpecialAssigns = onSnapshot(collection(db, "special_assignments"), (snapshot) => {
        adminSpecialAssignData = [];
        snapshot.forEach(d => adminSpecialAssignData.push({ ...d.data(), __backendId: d.id }));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.adminSpecialTemplates = onSnapshot(collection(db, "special_templates"), (snapshot) => {
        adminSpecialTemplatesData = [];
        snapshot.forEach(d => adminSpecialTemplatesData.push({ ...d.data(), __backendId: d.id }));
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));

      activeListeners.allOrders = onSnapshot(collection(db, "orders"), (snapshot) => {
        allUserOrdersData = [];
        snapshot.forEach(d => allUserOrdersData.push({ ...d.data(), __backendId: d.id }));
        updateHeaderStats();
        if($('admin-content')) renderAdminTab();
      }, (err) => console.warn(err));
    }

    function stopAdminSubscriptions() {
      if (activeListeners.adminUsers) { activeListeners.adminUsers(); activeListeners.adminUsers = null; }
      if (activeListeners.adminUsersThai) { activeListeners.adminUsersThai(); activeListeners.adminUsersThai = null; }
      if (activeListeners.adminWithdrawals) { activeListeners.adminWithdrawals(); activeListeners.adminWithdrawals = null; }
      if (activeListeners.adminWithdrawalsThai) { activeListeners.adminWithdrawalsThai(); activeListeners.adminWithdrawalsThai = null; }
      if (activeListeners.adminSpecialAssigns) { activeListeners.adminSpecialAssigns(); activeListeners.adminSpecialAssigns = null; }
      if (activeListeners.adminSpecialTemplates) { activeListeners.adminSpecialTemplates(); activeListeners.adminSpecialTemplates = null; }
      if (activeListeners.allOrders) { activeListeners.allOrders(); activeListeners.allOrders = null; }
    }

    onAuthStateChanged(auth, (user) => {
      if (user && user.email.endsWith('@admin.com')) {
        isAdmin = true;
        adminTab = sessionStorage.getItem('tos_admin_tab') || 'users'; 
        startAdminSubscriptions();
        renderAdmin();
      } else {
        isAdmin = false;
        renderAdminLogin();
      }
    });

    startPublicSubscriptions();

    // ==========================================
    // ADMIN AUTH UI
    // ==========================================
    function renderAdminLogin() {
      const app = $('app');
      app.innerHTML = `
      <div class="min-h-full w-full flex items-center justify-center p-4 bg-slate-100">
        <div class="w-full max-w-sm bg-white border border-slate-200 p-8 rounded-3xl shadow-xl">
          <div class="text-center mb-6">
            <span class="text-5xl">🏢</span>
            <h2 class="text-slate-800 font-black text-xl mt-4">TOS Admin Console</h2>
            <p class="text-slate-400 text-xs mt-1">ระบบคอนโซลควบคุมของแอดมินออฟฟิศ</p>
          </div>
          <div class="space-y-4">
            <input id="inp-admin-email" type="email" class="w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800 placeholder-slate-400 outline-none border border-slate-200 focus:border-blue-500" placeholder="อีเมลแอดมิน (@admin.com)">
            <input id="inp-admin-pass" type="password" onkeydown="if(event.key === 'Enter') doAdminLogin()" class="w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800 placeholder-slate-400 outline-none border border-slate-200 focus:border-blue-500" placeholder="รหัสผ่าน">
            <button onclick="doAdminLogin()" id="btn-admin-login" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow transition text-base">ลงชื่อเข้าใช้งาน</button>
          </div>
        </div>
      </div>`;
    }

    async function doAdminLogin() {
      const email = $('inp-admin-email').value.trim();
      const password = $('inp-admin-pass').value.trim();
      if (!email || !password) return showToast('กรุณากรอกข้อมูลให้ครบถ้วน','error');
      if (!email.endsWith('@admin.com')) return showToast('อีเมลแอดมินต้องลงท้ายด้วย @admin.com เท่านั้น','error');

      const btn = $('btn-admin-login');
      btn.disabled = true; btn.textContent = 'กำลังตรวจสอบสิทธิ์...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('ยินดีต้อนรับเข้าสู่ระบบ Admin');
      } catch (err) {
        btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
        showToast(`ล้มเหลว: ${err.code || err.message}`,'error');
      }
    }

    async function exitAdmin() { 
      isAdmin = false; 
      stopAdminSubscriptions();
      await signOut(auth);
    }

    // ==========================================
    // ADMIN PANEL LAYOUT (Corporate UI Style)
    // ==========================================
    function renderAdmin() {
      const sidebarMenu = [
        {id:'users', icon:'users', label:'โพรไฟล์ผู้ใช้', type:'main'},
        {id:'orders', icon:'list', label:'ประวัติสั่งซื้อ', type:'main'},
        {id:'special', icon:'star', label:'สินค้าประเภทพิเศษ', type:'main'},
        {id:'products_1', icon:'chevron-right', label:'VIP 1', type:'sub'},
        {id:'products_2', icon:'chevron-right', label:'VIP 2', type:'sub'},
        {id:'products_3', icon:'chevron-right', label:'VIP 3', type:'sub'},
        {id:'products_4', icon:'chevron-right', label:'VIP 4', type:'sub'},
        {id:'products_5', icon:'chevron-right', label:'VIP 5', type:'sub'},
        {id:'products_6', icon:'chevron-right', label:'VIP 6', type:'sub'},
        {id:'products_fixturn', icon:'chevron-right', label:'ซ่อมเทิร์น', type:'sub'},
        {id:'products_allowwd', icon:'chevron-right', label:'ปล่อยถอน', type:'sub'},
        {id:'withdrawals', icon:'banknote', label:`รายการถอนเงิน`, type:'main'},
        {id:'media', icon:'image', label:'สื่อ / แบนเนอร์', type:'main'},
        {id:'settings', icon:'settings', label:'การตั้งค่าระบบ', type:'main'}
      ];

      $('app').innerHTML = `
        <!-- Left Sidebar Navigation -->
        <div class="w-64 bg-slate-900 flex flex-col h-full overflow-hidden flex-shrink-0 shadow-lg">
          <div class="p-6 border-b border-slate-800 flex flex-col items-center flex-shrink-0">
            <div class="w-16 h-16 rounded-xl bg-white flex items-center justify-center overflow-hidden mb-3 border border-slate-700 shadow-sm">
              ${getLogoUrl() ? `<img src="${getLogoUrl()}" class="w-full h-full object-cover">` : `<span class="text-3xl">🛒</span>`}
            </div>
            <p class="text-sm font-black text-white">TOS Control Panel</p>
            <div class="mt-2 px-3 py-1 bg-blue-500/10 border border-blue-500/30 text-blue-400 rounded-full text-[9px] font-bold tracking-wider">
              ADMIN ID: 11448
            </div>
          </div>
          <div class="flex-1 overflow-y-auto px-3 py-4 space-y-1.5 scrollbar-none">
            ${sidebarMenu.map(m => {
              let isSelected = false;
              if (m.id.startsWith('products_')) {
                const subVip = m.id.replace('products_', '');
                isSelected = (adminTab === 'products' && adminProductTab === subVip);
              } else {
                isSelected = (adminTab === m.id);
              }
              const padClass = m.type === 'sub' ? 'pl-8 py-1.5 text-xs text-slate-400' : 'px-4 py-2.5 text-sm text-slate-300';
              const activeClass = isSelected ? 'bg-blue-600 text-white font-bold shadow-md shadow-blue-500/20' : 'hover:bg-slate-800 hover:text-white';
              return `<button onclick="handleSidebarClick('${m.id}')" class="w-full flex items-center gap-2.5 rounded-xl font-medium transition-all text-left ${padClass} ${activeClass}">
                <i data-lucide="${m.icon}" class="w-4 h-4"></i>
                <span>${m.label}</span>
              </button>`;
            }).join('')}

    function promptUserBalanceUpdate(bid, type) {
      const label = type === 'deposit' ? 'เติมเงินเพิ่มเครดิต' : 'ถอนหักเงินเครดิต';
      const amtStr = prompt(`ระบุจำนวนเงินที่ต้องการ ${label}:`);
      const amount = parseFloat(amtStr);
      if (isNaN(amount) || amount <= 0) return alert('จำนวนเงินไม่ถูกต้อง');
      
      const multiplier = type === 'deposit' ? 1 : -1;
      adjustUserBalanceDirectly(bid, amount * multiplier);
    }

    async function adjustUserBalanceDirectly(bid, adjustAmount) {
      const u = adminUsersData.find(d => d.__backendId === bid);
      
      let userDocRef = doc(db, "users", u.id);
      let userSnap = await getDocs(query(collection(db, "users"), where("id", "==", u.id)));
      if (userSnap.empty) {
        userDocRef = doc(db, "ผู้ใช้", u.id);
      }

      let wdCol = collection(db, "withdrawals");
      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          if (!snap.exists()) return;
          const currentCredit = getField(snap.data(), 'credit', 'เครดิต') || 0;

          const updatePayload = {};
          const nextCreditVal = Math.max(0, currentCredit + adjustAmount);
          if (snap.data().credit !== undefined) updatePayload.credit = nextCreditVal;
          if (snap.data().เครดิต !== undefined) updatePayload.เครดิต = nextCreditVal;

          transaction.update(userDocRef, updatePayload);

          const newWdRef = doc(wdCol);
          transaction.set(newWdRef, {
            type: 'withdrawal',
            id: newWdRef.id,
            userId: u.id,
            username: getField(snap.data(), 'username', 'ชื่อผู้ใช้') || 'ผู้ใช้',
            amount: Math.abs(adjustAmount),
            status: adjustAmount > 0 ? 'deposit' : 'rejected',
            createdAt: new Date().toISOString()
          });
        });
        showToast('ปรับปรุงยอดเครดิตสำเร็จ');
        closeModal();
        renderAdminTab();
      } catch (err) {
        showToast('การปรับยอดเงินล้มเหลว', 'error');
      }
    }

    async function saveAdminUser(bid) {
      const u = adminUsersData.find(d => d.__backendId === bid);
      
      let userDocRef = doc(db, "users", u.id);
      let userSnap = await getDocs(query(collection(db, "users"), where("id", "==", u.id)));
      if (userSnap.empty) {
        userDocRef = doc(db, "ผู้ใช้", u.id);
      }

      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          const userData = snap.data();

          const updatePayload = {
            firstName: $('eu-fname').value.trim(),
            lastName: $('eu-lname').value.trim(),
            phone: $('eu-phone').value.trim(),
            password: $('eu-pass').value.trim(),
            withdrawPassword: $('eu-pin').value.trim(),
            userLevel: $('eu-level').value,
            creditScore: parseInt($('eu-score').value) || 100
          };

          if (userData.รหัสผ่าน !== undefined) updatePayload.รหัสผ่าน = $('eu-pass').value.trim();
          if (userData.ระดับผู้ใช้ !== undefined) updatePayload.ระดับผู้ใช้ = $('eu-level').value;
          if (userData.คะแนนเครดิต !== undefined) updatePayload.คะแนนเครดิต = parseInt($('eu-score').value) || 100;

          transaction.update(userDocRef, updatePayload);
        });
        showToast('อัปเดตข้อมูลผู้ใช้เรียบร้อย');
        closeModal();
        renderAdminTab();
      } catch (err) {
        showToast('เกิดข้อผิดพลาดในการเซฟ', 'error');
      }
    }

    async function approveWithdraw(bid) { const w = adminWithdrawalsData.find(d => d.__backendId === bid); w.status = 'approved'; await windowDataSdk.update(w); renderAdminTab(); }
    
    async function rejectWithdraw(bid) { 
      const w = adminWithdrawalsData.find(d => d.__backendId === bid); 
      let userDocRef = doc(db, "users", w.userId);
      let userSnap = await getDocs(query(collection(db, "users"), where("id", "==", w.userId)));
      if (userSnap.empty) {
        userDocRef = doc(db, "ผู้ใช้", w.userId);
      }
      
      const wdDocRef = doc(db, getCol('withdrawal'), bid);

      try {
        await runTransaction(db, async (transaction) => {
          const uSnap = await transaction.get(userDocRef);
          if (uSnap.exists()) {
            const currentCredit = getField(uSnap.data(), 'credit', 'เครดิต') || 0;
            const updatePayload = {};
            const refundedVal = currentCredit + (w.amount || 0);
            if (uSnap.data().credit !== undefined) updatePayload.credit = refundedVal;
            if (uSnap.data().เครดิต !== undefined) updatePayload.เครดิต = refundedVal;
            
            transaction.update(userDocRef, updatePayload);
          }
          transaction.update(wdDocRef, { status: 'rejected' });
        });
        showToast('ปฏิเสธรายการถอนเงิน และคืนเครดิตสำเร็จ');
        renderAdminTab();
      } catch (err) {
        showToast('เกิดข้อผิดพลาดในการยกเลิก', 'error');
      }
    }

        </div>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-6 text-left">
          <h3 class="font-bold text-sm mb-3 text-blue-600 flex items-center gap-2 border-b border-slate-100 pb-2"><i data-lucide="key" class="w-4 h-4"></i> รหัสเชิญ (Invite code) สำหรับลูกค้าใช้สมัครสมาชิก</h3>

          <button onclick="showAddMenuIcon()" class="w-full py-2 mb-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl text-xs font-bold hover:bg-blue-100 transition">+ เพิ่มปุ่มเมนูใหม่</button>

            ${getMenuIcons().map(m => `
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-center justify-between">
                <div class="flex-1 text-slate-700 text-xs font-bold truncate pr-3">${m.menuLabel}</div>

                  <button onclick="editMenuIcon('${m.__backendId}')" class="p-2 text-blue-600 hover:bg-slate-200 rounded-lg transition"><i data-lucide="edit" class="w-4 h-4"></i></button>

              </div>`).join('')}

    function saveAdminTheme() {
      const p = $('cfg-theme-p-text').value.trim(); const s = $('cfg-theme-s-text').value.trim();
      let config = getConfig(); 
      if(!config) config = { type: 'config', id: genId() }; 
      
      const updatePayload = {
        ...config,
        themePrimary: p,
        themeSecondary: s,
        "ธีมหลัก": p,
        "ธีมรอง": s
      };
      
      const idx = publicData.configs.findIndex(d => d.type === 'config' || d.type === 'การตั้งค่า' || d.พิมพ์ === 'การตั้งค่า');
      if (idx !== -1) {
        publicData.configs[idx] = updatePayload;
      } else {
        publicData.configs.push(updatePayload);
      }

      windowDataSdk.update(updatePayload); 
      showToast('บันทึกสีธีมสำเร็จ');
    }

    function saveAdminSettings(type) {
      let config = getConfig(); 
      if(!config) {
        config = { 
          type: 'config', 
          id: genId(), 
          inviteCode: '12345', 
          logoUrl: '', 
          loginBgUrl: '', 
          userBgUrl: '',
          supportedBanks: 'ธนาคารกสิกรไทย,ธนาคารไทยพาณิชย์,ธนาคารกรุงเทพ,ธนาคารกรุงไทย,ธนาคารกรุงศรีอยุธยา,ธนาคารออมสิน,ทรูวอลเลท',
          "พิมพ์": "การตั้งค่า"
        }; 
      }
      
      const updatePayload = { ...config };

      if (type === 'logo') {
        updatePayload.logoUrl = $('cfg-logo').value.trim();
      }
      else if (type === 'bgs') { 
        updatePayload.loginBgUrl = $('cfg-login-bg').value.trim(); 
        updatePayload.userBgUrl = $('cfg-user-bg').value.trim(); 
      }
      else if (type === 'invite') { 
        const newInvite = $('cfg-invite').value.trim(); 
        if (!newInvite) return showToast('กรุณากรอกรหัสแนะนำ', 'error'); 
        updatePayload.inviteCode = newInvite; 
        updatePayload["รหัสเชิญ"] = newInvite;
      }
      else if (type === 'marquee') {
        updatePayload.marqueeText = $('cfg-marquee').value.trim();
        updatePayload["ข้อความวิ่ง"] = $('cfg-marquee').value.trim();
      }
      else if (type === 'line') { 
        updatePayload.lineQrUrl = $('cfg-line-qr').value.trim(); 
        updatePayload.lineId = $('cfg-line-id').value.trim(); 
      }
      else if (type === 'topup_banks') { 
        updatePayload.topupQrUrl = $('cfg-topup-qr').value.trim(); 
        updatePayload.topupAccount = $('cfg-topup-acc').value.trim(); 
        updatePayload.supportedBanks = $('cfg-banks').value.trim();
        updatePayload["รายการธนาคาร"] = $('cfg-banks').value.trim();
      }
      else if (type === 'tab_config') { 
        updatePayload.tabTitle = $('cfg-tab-title').value.trim(); 
        updatePayload["แท็บชื่อเรื่อง"] = $('cfg-tab-title').value.trim();
        updatePayload.tabFaviconUrl = $('cfg-tab-favicon').value.trim(); 
      }

      const idx = publicData.configs.findIndex(d => d.type === 'config' || d.type === 'การตั้งค่า' || d.พิมพ์ === 'การตั้งค่า');
      if (idx !== -1) {
        publicData.configs[idx] = updatePayload;
      } else {
        publicData.configs.push(updatePayload);
      }

      windowDataSdk.update(updatePayload); 
      showToast('บันทึกสำเร็จ!'); 
      renderAdminTab();
    }

    function showAddMenuIcon() { showModal(`<h3 class="font-bold text-base mb-4 text-slate-800 border-b pb-2">เพิ่มปุ่มเมนูคู่มือใหม่</h3><input id="mi-label" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-sm text-slate-700" placeholder="ชื่อเมนูคู่มือ"><input id="mi-url" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-sm text-slate-700" placeholder="URL ลิงก์รูปภาพไอคอนคู่มือ"><textarea id="mi-content" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl h-28 mb-4 text-slate-700 text-sm" placeholder="เนื้อหารายละเอียดที่จะสปริงฟอร์มโชว์หน้าผู้ใช้..."></textarea><button onclick="doAddMenuIcon()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition text-sm">ยืนยันการสร้างเมนู</button>`); }
    function editMenuIcon(bid) { const m = publicData.menuIcons.find(d => d.__backendId === bid); showModal(`<h3 class="font-bold text-base mb-4 text-slate-800 border-b pb-2">แก้ไขข้อมูลเมนูคู่มือ</h3><input id="mi-label" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl mb-3 text-sm" value="${m.menuLabel}"><input id="mi-url" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl mb-3 text-sm" value="${m.menuIconUrl||''}"><textarea id="mi-content" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl h-28 mb-4 text-sm">${m.menuContent||''}</textarea><button onclick="doEditMenuIcon('${bid}')" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition text-sm">อัปเดตข้อมูลเมนู</button>`); }
    function doAddMenuIcon() { windowDataSdk.create({ type:'menuIcon', id:genId(), menuLabel: $('mi-label').value.trim(), menuContent: $('mi-content').value.trim(), menuIconUrl: $('mi-url').value.trim() }); closeModal(); renderAdminTab(); }
    function doEditMenuIcon(bid) { const m = publicData.menuIcons.find(d => d.__backendId === bid); windowDataSdk.update({ ...m, menuLabel: $('mi-label').value.trim(), menuContent: $('mi-content').value.trim(), menuIconUrl: $('mi-url').value.trim() }); closeModal(); renderAdminTab(); }
    function deleteMenuIcon(bid) { if(confirm('ต้องการลบข้อมูลนี้หรือไม่?')) { windowDataSdk.delete(publicData.menuIcons.find(d => d.__backendId === bid)); renderAdminTab(); } }

  </script>
