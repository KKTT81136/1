<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>TOS Shopping</title>
  <link rel="icon" type="image/x-icon" href="">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', function(e) {
      if(e.keyCode == 123) { e.preventDefault(); return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { e.preventDefault(); return false; } 
    });
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
          }
        }
      }
    }
  </script>

  <style>
    :root { 
      --color-primary: #2563eb; 
      --color-secondary: #4f46e5; 
    }
    * { 
      font-family: 'Kanit', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      user-select: none; 
      -webkit-user-select: none; 
      box-sizing: border-box;
    }
    input, textarea, select { 
      user-select: auto; 
      -webkit-user-select: auto; 
      font-size: 16px !important; 
    }
    html, body { 
      min-height: 100%; 
      margin: 0; 
      background-color: #f8fafc; 
      touch-action: manipulation; 
    }
    .bg-theme-gradient { 
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); 
    }
    .fade-in { 
      animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(8px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes dots { 
      0%, 80%, 100% { transform: scale(0); } 
      40% { transform: scale(1); } 
    }
    .dot-anim span { 
      display: inline-block; 
      width: 10px; 
      height: 10px; 
      border-radius: 50%; 
      background: var(--color-primary); 
      margin: 0 4px; 
      animation: dots 1.2s infinite ease-in-out both; 
    }
    .dot-anim span:nth-child(1) { animation-delay: -0.32s; } 
    .dot-anim span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes slideIn { 
      from { transform: scale(0.95) translateY(10px); opacity: 0; } 
      to { transform: scale(1) translateY(0); opacity: 1; } 
    }
    .modal-anim { 
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes toastSlide { 
      from { opacity: 0; transform: translate(-50%, -15px); } 
      to { opacity: 1; transform: translate(-50%, 0); } 
    }
    .toast-show { 
      animation: toastSlide 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    ::-webkit-scrollbar { 
      width: 6px; 
    }
    ::-webkit-scrollbar-track { 
      background: transparent; 
    }
    ::-webkit-scrollbar-thumb { 
      background: rgba(203, 213, 225, 0.8); 
      border-radius: 99px; 
    }
    .banner-slide { 
      transition: opacity 0.8s ease-in-out; 
    }
    .marquee-container { 
      overflow: hidden; 
      white-space: nowrap; 
      width: 100%; 
      display: block; 
      position: relative; 
    }
    .marquee-text { 
      display: inline-block; 
      padding-left: 100%; 
      animation: smoothMarquee 15s linear infinite; 
      will-change: transform; 
    }
    @keyframes smoothMarquee { 
      0% { transform: translate3d(0, 0, 0); } 
      100% { transform: translate3d(-100%, 0, 0); } 
    }
    .nav-glass { 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }
    .custom-bg { 
      background-size: cover; 
      background-position: center; 
      background-repeat: no-repeat;
    }
  </style>
 </head>
 <body class="h-full text-slate-800 antialiased selection:bg-blue-200">

  <div id="initial-loader" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-all duration-300">
    <div id="loader-logo-container" class="w-28 h-28 rounded-full overflow-hidden flex items-center justify-center bg-slate-50 border border-slate-100 p-0 shadow-sm">
      <span class="text-5xl">🛒</span>
    </div>
  </div>
  
  <script>
    if (localStorage.getItem('tos_logged_user_id')) {
      document.getElementById('initial-loader').style.display = 'none';
    }
  </script>
  
  <div id="app" class="h-full w-full overflow-auto relative flex flex-col"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
      getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, query, where, getDocs, runTransaction 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { 
      getAuth, signInAnonymously, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const _0xdbKey = [
      "QUl6YVN5QnhWazBMQlg5UkNzOXYzRXNNUDF5SnNpR3ItYmpwb3Jz", 
      "a2std2ViLTdkMDJiLmZpcmViYXNlYXBwLmNvbQ==",             
      "a2std2ViLTdkMDJi",                                     
      "a2std2ViLTdkMDJiLmZpcmViYXNlc3RvcmFnZS5hcHA=",         
      "ODY2ODE4NTI4MjAw",                                     
      "MTo4NjY4MTg1MjgyMDA6d2ViOmViMmRmMzhjNDhmY2UyNjVmZmU2ZmQ=", 
      "Ry1SM0cxWDRSNzZC"                                      
    ];

    const firebaseConfig = {
      apiKey: atob(_0xdbKey[0]),
      authDomain: atob(_0xdbKey[1]),
      projectId: atob(_0xdbKey[2]),
      storageBucket: _0xdbKey[3] ? atob(_0xdbKey[3]) : "",
      messagingSenderId: atob(_0xdbKey[4]),
      appId: atob(_0xdbKey[5]),
      measurementId: atob(_0xdbKey[6])
    };

    const appInstance = initializeApp(firebaseConfig);
    const db = getFirestore(appInstance);
    const auth = getAuth(appInstance);

    // ==========================================
    // STATE ENGINE
    // ==========================================
    let currentUser = null;
    let currentTab = 'home';
    let lastRenderedTab = ''; 
    let historyTab = 'orders';
    let bannerInterval = null;
    let isOrderProcessing = false;
    let isConfigsLoaded = false;

    let publicData = {
      configs: [],
      banners: [],
      galleries: [],
      menuIcons: [],
      products: []
    };

    let userOrdersData = [];
    let userWithdrawalsData = [];
    let userSpecialAssignData = [];

    let activeListeners = {
      configs: null, banners: null, galleries: null, menuIcons: null, products: null,
      userDoc: null, userOrders: null, userWithdrawals: null, userSpecialAssigns: null
    };

    function applyTheme(primary, secondary) {
      const p = primary || '#2563eb';
      const s = secondary || '#4f46e5';
      document.documentElement.style.setProperty('--color-primary', p);
      document.documentElement.style.setProperty('--color-secondary', s);
      document.body.style.setProperty('--color-primary', p);
      document.body.style.setProperty('--color-secondary', s);
    }

    function updateBrowserTab() {
      document.title = getTabTitle();
      const favUrl = getTabFavicon();
      if (favUrl) {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement('link');
          link.rel = 'icon';
          document.head.appendChild(link);
        }
        link.href = favUrl;
      }
    }

    const $ = id => document.getElementById(id);
    const getProducts = () => publicData.products;
    const getSpecialAssignments = () => userSpecialAssignData;
    const getBanners = () => publicData.banners;
    const getGallery = () => publicData.galleries;
    const getMenuIcons = () => publicData.menuIcons;
    
    const getConfig = () => {
      if (publicData.configs && publicData.configs.length > 0) {
        return publicData.configs[0];
      }
      return {
        themePrimary: '#2563eb',
        themeSecondary: '#4f46e5',
        inviteCode: '12345',
        logoUrl: '',
        loginBgUrl: '',
        userBgUrl: '',
        marqueeText: 'Welcome to TOS Shopping',
        tabTitle: 'TOS Shopping',
        tabFaviconUrl: '',
        supportedBanks: 'KBank,SCB,BBL,KTB,Krungsri,GSB,TrueMoney'
      };
    };

    const getInviteCode = () => { const c = getConfig(); return String(c.inviteCode || '12345').trim(); };
    const getLogoUrl = () => { const c = getConfig(); return c.logoUrl || ''; };
    const getLoginBgUrl = () => { const c = getConfig(); return c.loginBgUrl || ''; };
    const getUserBgUrl = () => { const c = getConfig(); return c.userBgUrl || ''; };
    const getMarqueeText = () => { const c = getConfig(); return c.marqueeText || 'Welcome to TOS Shopping'; };
    const getLineQrUrl = () => { const c = getConfig(); return c.lineQrUrl || ''; };
    const getLineId = () => { const c = getConfig(); return c.lineId || ''; };
    const getTopupQrUrl = () => { const c = getConfig(); return c.topupQrUrl || ''; };
    const getTopupAccount = () => { const c = getConfig(); return c.topupAccount || ''; };
    const getTabTitle = () => { const c = getConfig(); return c.tabTitle || 'TOS Shopping'; };
    const getTabFavicon = () => { const c = getConfig(); return c.tabFaviconUrl || ''; };

    const getUserOrders = () => userOrdersData;
    const getUserWithdrawals = () => userWithdrawalsData;

    function genId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    function showToast(msg, type='success') {
      const old = $('toast-container'); if (old) old.remove();
      const colors = { 
        success:'bg-emerald-600 border-emerald-700 text-white', 
        error:'bg-red-600 border-red-700 text-white', 
        info:'bg-blue-600 border-blue-700 text-white' 
      };
      const icons = { success:'check-circle', error:'alert-circle', info:'info' };
      const div = document.createElement('div');
      div.id = 'toast-container';
      div.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-[9999] toast-show w-max max-w-[90vw]';
      div.innerHTML = `
        <div class="${colors[type]} px-6 py-3.5 rounded-2xl shadow-lg border flex items-center gap-3 text-sm font-bold tracking-wide">
          <i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0 text-white"></i>
          <span class="text-white">${msg}</span>
        </div>`;
      document.body.appendChild(div);
      lucide.createIcons();
      setTimeout(() => { if(div) div.remove(); }, 2500);
    }

    function showModal(content) {
      let m = $('modal-overlay');
      if (!m) { 
        m = document.createElement('div'); m.id = 'modal-overlay'; 
        m.addEventListener('click', function(e) { if (e.target === m) closeModal(); });
        document.body.appendChild(m); 
      }
      m.className = 'fixed inset-0 bg-black/75 z-[100] flex items-center justify-center p-4 cursor-pointer';
      m.innerHTML = `
        <div class="bg-white rounded-[24px] p-6 w-full max-w-sm modal-anim shadow-xl border border-slate-200 max-h-[90vh] overflow-y-auto cursor-auto text-slate-900" onclick="event.stopPropagation()">
          ${content}
        </div>`;
      lucide.createIcons();
    }
    function closeModal() { const m = $('modal-overlay'); if (m) m.remove(); isOrderProcessing = false; }

    function refreshUI() {
      if (currentUser && $('dash-content')) {
        renderTabContent(); 
        applyDynamicStyles();
      }
    }

    function applyDynamicStyles() {
      const cfg = getConfig();
      if (!cfg) return;

      applyTheme(cfg.themePrimary, cfg.themeSecondary);

      const loginWrapper = document.getElementById('form-card-wrapper');
      if (loginWrapper) {
        const bgUrl = getLoginBgUrl();
        if (bgUrl) {
          loginWrapper.style.backgroundImage = `url('${bgUrl}')`;
          loginWrapper.style.backgroundSize = 'cover';
          loginWrapper.style.backgroundPosition = 'center';
          loginWrapper.style.backgroundRepeat = 'no-repeat';
          loginWrapper.classList.remove('bg-theme-gradient');
        } else {
          loginWrapper.style.backgroundImage = '';
          loginWrapper.classList.add('bg-theme-gradient');
        }
      }

      const dashOuter = document.getElementById('dash-outer-container');
      if (dashOuter) {
        const userBgUrl = getUserBgUrl();
        if (userBgUrl) {
          dashOuter.style.backgroundImage = `url('${userBgUrl}')`;
          dashOuter.style.backgroundSize = 'cover';
          dashOuter.style.backgroundPosition = 'center';
          dashOuter.style.backgroundRepeat = 'no-repeat';
          dashOuter.classList.remove('bg-slate-50');
        } else {
          dashOuter.style.backgroundImage = '';
          dashOuter.classList.add('bg-slate-50');
        }
      }

      const marqueeEl = document.getElementById('marquee-text-display');
      if (marqueeEl) {
        marqueeEl.innerText = getMarqueeText();
      }

      const logos = document.querySelectorAll('.app-logo-img');
      logos.forEach(img => {
        const logoUrl = getLogoUrl();
        if (logoUrl) img.src = logoUrl;
      });
    }

    function dismissPreloader() {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 150);
      }
    }

    function handlePublicDataLoadComplete() {
      if (!isConfigsLoaded) {
        const cfg = getConfig();
        const loader = document.getElementById('initial-loader');
        if (loader && cfg) {
          const loginBg = getLoginBgUrl();
          const logoUrl = getLogoUrl();
          if (loginBg) {
            loader.style.backgroundImage = `url('${loginBg}')`;
            loader.style.backgroundSize = 'cover';
            loader.style.backgroundPosition = 'center';
            loader.style.backgroundColor = 'transparent';
          } else {
            const primaryColor = cfg.themePrimary || '#2563eb';
            loader.style.backgroundColor = primaryColor;
          }
          const logoContainer = document.getElementById('loader-logo-container');
          if (logoContainer && logoUrl) {
            logoContainer.innerHTML = `<img src="${logoUrl}" class="w-full h-full object-cover rounded-full">`;
            logoContainer.style.backgroundColor = 'white';
          }
        }
        isConfigsLoaded = true;
        dismissPreloader();
      }
    }

    function startPublicSubscriptions() {
      activeListeners.configs = onSnapshot(doc(db, "configs", "system_config"), (docSnap) => {
        if (docSnap.exists()) {
          const cfgData = { ...docSnap.data(), __backendId: docSnap.id };
          publicData.configs = [cfgData];
          applyTheme(cfgData.themePrimary, cfgData.themeSecondary);
          updateBrowserTab();
          applyDynamicStyles();
          if (currentUser && $('dash-content')) {
            renderTabContent();
          }
        }
        handlePublicDataLoadComplete();
      }, (err) => {
        console.warn("Config load error: ", err);
        handlePublicDataLoadComplete();
      });

      activeListeners.banners = onSnapshot(collection(db, "banners"), (snapshot) => {
        let banners = [];
        snapshot.forEach(d => banners.push({ ...d.data(), __backendId: d.id }));
        publicData.banners = banners;
        refreshUI();
      }, (err) => console.warn(err));

      activeListeners.galleries = onSnapshot(collection(db, "galleries"), (snapshot) => {
        let galleries = [];
        snapshot.forEach(d => galleries.push({ ...d.data(), __backendId: d.id }));
        publicData.galleries = galleries;
        refreshUI();
      }, (err) => console.warn(err));

      activeListeners.menuIcons = onSnapshot(collection(db, "menu_icons"), (snapshot) => {
        let icons = [];
        snapshot.forEach(d => icons.push({ ...d.data(), __backendId: d.id }));
        publicData.menuIcons = icons.sort((a,b) => parseInt(a.menuOrder||0) - parseInt(b.menuOrder||0));
        refreshUI();
      }, (err) => console.warn(err));

      activeListeners.products = onSnapshot(collection(db, "products"), (snapshot) => {
        let prods = [];
        snapshot.forEach(d => prods.push({ ...d.data(), __backendId: d.id }));
        publicData.products = prods.sort((a,b) => parseInt(a.productOrder||0) - parseInt(b.productOrder||0));
        refreshUI();
      }, (err) => console.warn(err));
    }

    function handleLogoClick() {
      if (currentUser) {
        switchTab('profile');
      }
    }

    function startUserSubscriptions(userId) {
      stopUserSubscriptions();
      
      activeListeners.userDoc = onSnapshot(doc(db, "users", userId), (docSnap) => {
        if (docSnap.exists()) {
          currentUser = { ...docSnap.data(), id: docSnap.id, __backendId: docSnap.id };
          refreshUI();
        } else {
          doLogout();
        }
      }, () => {
        doLogout();
      });

      const ordersQuery = query(collection(db, "orders"), where("userId", "==", userId));
      activeListeners.userOrders = onSnapshot(ordersQuery, (snapshot) => {
        userOrdersData = [];
        snapshot.forEach(d => userOrdersData.push({ ...d.data(), __backendId: d.id }));
        refreshUI();
      });

      const withdrawalsQuery = query(collection(db, "withdrawals"), where("userId", "==", userId));
      activeListeners.userWithdrawals = onSnapshot(withdrawalsQuery, (snapshot) => {
        userWithdrawalsData = [];
        snapshot.forEach(d => userWithdrawalsData.push({ ...d.data(), __backendId: d.id }));
        refreshUI();
      });

      const specialQuery = query(collection(db, "special_assignments"), where("targetUser", "==", userId));
      activeListeners.userSpecialAssigns = onSnapshot(specialQuery, (snapshot) => {
        userSpecialAssignData = [];
        snapshot.forEach(d => userSpecialAssignData.push({ ...d.data(), __backendId: d.id }));
        refreshUI();
      });
    }

    function stopUserSubscriptions() {
      if (activeListeners.userDoc) { activeListeners.userDoc(); activeListeners.userDoc = null; }
      if (activeListeners.userOrders) { activeListeners.userOrders(); activeListeners.userOrders = null; }
      if (activeListeners.userWithdrawals) { activeListeners.userWithdrawals(); activeListeners.userWithdrawals = null; }
      if (activeListeners.userSpecialAssigns) { activeListeners.userSpecialAssigns(); activeListeners.userSpecialAssigns = null; }
    }

    function checkCustomLoginState() {
      const cachedUserId = localStorage.getItem('tos_logged_user_id');
      if (cachedUserId) {
        currentUser = { id: cachedUserId }; 
        currentTab = sessionStorage.getItem('tos_current_tab') || 'home'; 
        startUserSubscriptions(cachedUserId);
        renderDashboard(); 
        dismissPreloader();
      } else {
        renderLogin();
        dismissPreloader();
      }

      signInAnonymously(auth).catch(err => {
        console.warn("Auth background error: ", err);
      });
    }

    checkCustomLoginState();
    startPublicSubscriptions();

    // ==========================================
    // LOGIN / REGISTER
    // ==========================================
    function getLogoHtml() {
      const logoUrl = getLogoUrl();
      return logoUrl ? `<img src="${logoUrl}" class="app-logo-img w-full h-full object-cover rounded-full cursor-pointer" onclick="handleLogoClick()">` : `<span class="text-5xl text-gray-800 cursor-pointer" onclick="handleLogoClick()">🛒</span>`;
    }

    function renderLogin() {
      const app = $('app');
      const bgUrl = getLoginBgUrl();
      const bgStyle = bgUrl ? `background-image: url('${bgUrl}'); background-size: cover; background-position: center;` : '';

      app.innerHTML = `
      <div id="form-card-wrapper" class="min-h-full w-full flex flex-col items-center justify-center p-4 relative ${bgUrl ? '' : 'bg-theme-gradient'}" style="${bgStyle}">
        <div class="w-full max-w-sm relative z-10 py-4">
          <div class="text-center mb-6">
            <div id="logo-click" class="inline-flex items-center justify-center w-32 h-32 rounded-full shadow-2xl overflow-hidden bg-transparent p-0">
              ${getLogoHtml()}
            </div>
          </div>
          <div id="form-card" class="bg-slate-950/85 rounded-[32px] p-6 shadow-2xl border border-white/10 transition-all duration-300">
            <div id="form-content"></div>
          </div>
          <p class="text-center mt-6 text-white/95 text-sm font-medium" id="toggle-link"></p>
        </div>
      </div>`;
      showLoginForm();
      lucide.createIcons();
    }

    function showLoginForm() {
      const logoBtn = $('logo-click'); 
      if(logoBtn) { logoBtn.className = "inline-flex items-center justify-center w-32 h-32 rounded-full shadow-2xl overflow-hidden bg-transparent p-0"; }
      $('form-content').innerHTML = `
        <h2 class="text-white font-bold text-xl mb-6 text-center tracking-wide">Sign In</h2>
        <div class="space-y-4">
          <input id="inp-phone-login" type="tel" class="w-full px-4 py-3.5 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none focus:bg-white/25 transition font-medium text-base border border-white/10" placeholder="Phone Number">
          <input id="inp-pass-login" type="password" class="w-full px-4 py-3.5 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none focus:bg-white/25 transition font-medium text-base border border-white/10" placeholder="Password">
          <button onclick="doLogin()" id="btn-login" class="w-full py-3.5 mt-2 bg-white text-primary font-bold rounded-2xl shadow-xl hover:bg-slate-50 active:scale-[0.98] transition text-base tracking-wide">Sign In</button>
        </div>`;
      $('toggle-link').innerHTML = `Don't have an account? <a href="#" onclick="showRegisterForm(); return false" class="underline font-bold text-white hover:text-slate-100">Register Here</a>`;
    }

    function showRegisterForm() {
      const logoBtn = $('logo-click'); 
      if(logoBtn) { logoBtn.className = "inline-flex items-center justify-center w-20 h-20 rounded-full shadow-xl overflow-hidden bg-transparent p-0"; }
      $('form-content').innerHTML = `
        <h2 class="text-white font-bold text-xl mb-4 text-center tracking-wide">Register</h2>
        <div class="space-y-3">
          <input id="inp-phone-reg" type="tel" class="w-full px-4 py-3 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none font-medium text-base border border-white/10" placeholder="Phone Number">
          <input id="inp-user-reg" class="w-full px-4 py-3 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none font-medium text-base border border-white/10" placeholder="Username">
          <input id="inp-pass-reg" type="password" class="w-full px-4 py-3 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none font-medium text-base border border-white/10" placeholder="Password">
          <input id="inp-pin-reg" type="password" class="w-full px-4 py-3 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none font-medium text-base border border-white/10" placeholder="Withdraw PIN (6 Digits)">
          <input id="inp-invite-reg" type="text" class="w-full px-4 py-3 rounded-2xl bg-white/15 text-yellow-300 placeholder-yellow-300/80 outline-none border-2 border-yellow-400/60 font-bold text-base" placeholder="Invite Code">
          <button onclick="doRegister()" id="btn-reg" class="w-full py-3.5 bg-white text-primary font-bold rounded-2xl shadow-xl mt-3 text-base tracking-wide hover:bg-slate-50 transition">Register</button>
        </div>`;
      $('toggle-link').innerHTML = `Already have an account? <a href="#" onclick="showLoginForm(); return false" class="underline font-bold text-white hover:text-slate-100">Sign In</a>`;
    }

    async function doLogin() {
      const phone = $('inp-phone-login').value.trim(); 
      const password = $('inp-pass-login').value.trim();
      if (!phone || !password) return showToast('Please fill in all fields','error');
      
      const btn = $('btn-login');
      btn.disabled = true; 
      btn.textContent = 'Processing...';

      try {
        let q = query(collection(db, "users"), where("phone", "==", phone));
        let snap = await getDocs(q);
        
        if(!snap.empty) {
          const userDoc = snap.docs[0];
          const userData = userDoc.data();
          const savedPassword = userData.password;
          
          if (savedPassword === password) {
            const userId = userDoc.id;
            localStorage.setItem('tos_logged_user_id', userId);
            startUserSubscriptions(userId);
            showToast('Login Successful!');
            currentTab = 'home';
            renderDashboard(); 
          } else {
            btn.disabled = false; 
            btn.textContent = 'Sign In';
            showToast('Invalid password', 'error');
          }
        } else {
          btn.disabled = false; 
          btn.textContent = 'Sign In';
          showToast('User not found', 'error');
        }
      } catch (err) {
        btn.disabled = false; 
        btn.textContent = 'Sign In';
        showToast('Connection error: ' + err.message, 'error');
      }
    }

    async function doRegister() {
      const phone = $('inp-phone-reg').value.trim(); 
      const username = $('inp-user-reg').value.trim();
      const password = $('inp-pass-reg').value.trim(); 
      const pin = $('inp-pin-reg').value.trim();
      const invite = $('inp-invite-reg').value.trim();

      if(!username || !phone || !password || !pin || !invite) return showToast('Please fill in all fields','error');
      if(String(invite) !== getInviteCode()) return showToast('Invalid invite code','error');
      
      $('btn-reg').disabled = true; $('btn-reg').textContent = 'Processing...';

      try {
        let q = query(collection(db, "users"), where("phone", "==", phone));
        let snap = await getDocs(q);
        
        if (!snap.empty) {
          showToast('This phone number is already registered', 'error');
          $('btn-reg').disabled = false; $('btn-reg').textContent = 'Register';
          return;
        }

        const uid = genId();
        const payload = {
          id: uid,
          username: username,
          phone: phone,
          password: password, 
          withdrawPassword: pin,
          firstName: '',
          lastName: '',
          credit: 0,
          bankName: '',
          bankNumber: '',
          userLevel: '1',
          runIndex: 0,
          creditScore: 100,
          createdAt: new Date().toISOString()
        };

        await setDoc(doc(db, "users", uid), payload);
        
        localStorage.setItem('tos_logged_user_id', uid);
        startUserSubscriptions(uid);
        showToast('Registration successful!');
        currentTab = 'home';
        renderDashboard();
      } catch(err) {
        showToast('Registration failed', 'error');
        $('btn-reg').disabled = false; $('btn-reg').textContent = 'Register';
      }
    }

    function startBannerSlide() {
      clearInterval(bannerInterval); const slides = document.querySelectorAll('.banner-slide');
      if (slides.length > 1) { 
        let idx = 0; 
        bannerInterval = setInterval(() => { 
          const activeSlides = document.querySelectorAll('.banner-slide'); 
          if(!activeSlides.length) return; 
          if(activeSlides[idx]) activeSlides[idx].style.opacity = 0; 
          idx = (idx + 1) % activeSlides.length; 
          if(activeSlides[idx]) activeSlides[idx].style.opacity = 1; 
        }, 4000); 
      }
    }

    function startRun(btnElement) {
      if (isOrderProcessing) return; isOrderProcessing = true;
      if (btnElement) { btnElement.disabled = true; btnElement.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> Checking...'; lucide.createIcons(); }
      const u = currentUser;
      const creditVal = u.credit || 0;
      const done = u.runIndex || 0;
      const userLevel = u.userLevel || '1';

      if (getUserOrders().find(o => o.status === 'pending')) {
        showModal(`
          <div class="text-center py-4">
            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-amber-100"><i data-lucide="alert-circle" class="w-10 h-10"></i></div>

            <p class="text-slate-600 text-sm mt-2 leading-relaxed">You have an outstanding pending order. Please complete it in your history page.</p>
            <button onclick="closeModal(); switchTab('history'); switchHistoryTab('orders');" class="mt-6 w-full py-3.5 bg-primary text-white font-bold rounded-2xl shadow-md text-base hover:opacity-95 active:scale-[0.98] transition">View Pending Order</button>
          </div>`);
        if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = '<i data-lucide="play-circle"></i> Start Match'; lucide.createIcons(); } return;
      }

      if (creditVal <= 0) {
        showModal(`
          <div class="text-center py-4">
            <div class="w-20 h-20 bg-slate-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-circle" class="w-10 h-10"></i></div>
            <h3 class="text-lg font-bold text-slate-800">Insufficient Balance</h3>
            <p class="text-slate-600 text-sm mt-2">Your wallet balance is too low. Please deposit funds before continuing.</p>
            <button onclick="closeModal(); showSupportModal();" class="mt-6 w-full py-3.5 bg-slate-900 text-white font-bold rounded-2xl shadow-md flex justify-center items-center gap-2 text-base hover:bg-black transition">Contact Support</button>
            <button onclick="closeModal()" class="mt-3 w-full py-3 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200">Close</button>
          </div>`);
        if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = '<i data-lucide="play-circle"></i> Start Match'; lucide.createIcons(); } return;
      }

      const availableProducts = getProducts().filter(p => String(p.vipLevel) === String(userLevel));
      const targetOrderNum = done + 1;
      
      const specialProduct = getSpecialAssignments().find(s => s.targetUser === u.id && Number(s.targetIndex) === targetOrderNum);
      let pToRun = null; let isSpecial = false;
      
      if (specialProduct) { 
        pToRun = specialProduct; isSpecial = true; 
      } else {
        if (availableProducts.length === 0) { showToast('No products configured for your tier','info'); isOrderProcessing = false; if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = '<i data-lucide="play-circle"></i> Start Match'; lucide.createIcons(); } return; }
        if (done >= availableProducts.length) { showToast('🎉 All tasks completed for today!','info'); isOrderProcessing = false; if(btnElement) { btnElement.disabled = false; btnElement.innerHTML = '<i data-lucide="play-circle"></i> Start Match'; lucide.createIcons(); } return; }
        pToRun = availableProducts[done];
      }
      processOrderFlowStep1(pToRun, isSpecial, btnElement);
    }

    function processOrderFlowStep1(p, isSpecial, btnElement) {
      showModal(`<div class="text-center py-8"><div class="dot-anim mb-4 flex justify-center mx-auto"><span></span><span></span><span></span></div><p class="text-slate-600 font-bold mt-4 text-base">Matching order...</p></div>`);

        showModal(`

              <p class="font-black text-primary text-xl">฿${(p.productPrice||0).toLocaleString()}</p>

    function triggerStep1Delay(pId, isSpecial) {
      const btn = $('btn-buy-step1');
      if (!btn) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="inline-flex items-center gap-2"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing transaction...</span>';
      lucide.createIcons();
      setTimeout(() => {
        processOrderFlowStep2(pId, isSpecial);
      }, 1500);
    }

    async function processOrderFlowStep2(productIdOrObj, isSpecial) {
      const u = currentUser; 
      const creditVal = u.credit || 0;
      const usernameVal = u.username || 'User';
      
      let p = typeof productIdOrObj === 'object' ? productIdOrObj : publicData.products.find(d => d.__backendId === productIdOrObj); 
      if(!p && typeof productIdOrObj === 'string') {
        p = userOrdersData.find(d => d.__backendId === productIdOrObj);
      }
      if(!p) return;
      
      const isSpecialMode = (isSpecial === true || String(isSpecial) === 'true');

      if (creditVal < (p.productPrice || 0)) { 
        const existingPending = getUserOrders().find(o => o.status === 'pending');
        if (p.type !== 'order' && !existingPending) {
          const orderData = { 
            type:'order', id:genId(), userId:u.id, username:usernameVal, 
            productName:p.productName, productPrice:p.productPrice, 
            commission:p.commission, productImage:p.productImage||'', 
            status:'pending', isSpecial: isSpecialMode, createdAt: new Date().toISOString() 
          };
          await setDoc(doc(db, "orders", orderData.id), orderData);
          p = orderData; 
        } else if (existingPending) { 
          p = existingPending; 
        }
        showModal(`
          <div class="text-center">
            <div class="w-full h-64 bg-slate-100 rounded-2xl mb-4 overflow-hidden border border-slate-200 flex items-center justify-center p-4 relative">
              ${p.productImage ? `<img src="${p.productImage}" class="w-full h-full object-contain relative z-0">` : `<i data-lucide="package" class="w-20 h-20 text-slate-300 relative z-0"></i>`}
            </div>
            <p class="text-slate-950 font-bold mt-5 text-center text-sm leading-relaxed uppercase px-2">Your wallet balance is insufficient. Please contact support to deposit funds.</p>
            <button onclick="closeModal(); showSupportModal();" class="mt-6 w-full py-3.5 bg-slate-900 text-white font-bold rounded-2xl hover:bg-black transition shadow-md text-base flex justify-center items-center gap-2">Contact Support</button>
            <button onclick="closeModal(); switchTab('history'); switchHistoryTab('orders');" class="mt-3 w-full py-3 bg-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-300 transition">View Outstanding Order</button>
          </div>`);
        return;
      }

      showModal(`
        <div class="text-center">
          <div class="w-full h-64 bg-white rounded-2xl mb-5 overflow-hidden border border-slate-100 flex items-center justify-center shadow-inner p-4">
            ${p.productImage ? `<img src="${p.productImage}" class="w-full h-full object-contain">` : `<i data-lucide="package" class="w-20 h-20 text-slate-300"></i>`}
          </div>
          <h3 class="text-sm font-bold text-slate-800 leading-snug line-clamp-2">${p.productName}</h3>
          <div class="bg-slate-50 border border-slate-200/60 rounded-2xl p-4 mt-5 text-sm text-left shadow-inner">
            <div class="flex justify-between mb-2">
              <span class="text-slate-600 font-bold">Wallet Balance:</span> 
              <span class="font-bold text-primary">฿${creditVal.toLocaleString()}</span>
            </div>
            <div class="flex justify-between text-base border-t border-slate-200 pt-2 mt-2">
              <span class="text-slate-950 font-bold">Amount Due:</span> 
              <span class="font-black text-slate-950">฿${p.productPrice.toLocaleString()}</span>
            </div>
          </div>
          <button onclick="confirmOrderSuccess('${p.__backendId}', ${isSpecialMode})" id="btn-confirm-final" class="mt-6 w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl shadow-md active:scale-[0.98] transition text-base">Confirm Purchase</button>
        </div>`);
    }

    async function confirmOrderSuccess(id, isSpecial) {
      const btn = $('btn-confirm-final'); if(!btn || btn.disabled) return;
      btn.disabled = true; btn.innerHTML = 'Processing...';
      
      let p = publicData.products.find(d => d.__backendId === id) || userOrdersData.find(d => d.__backendId === id); 
      if(!p) return;

      let userDocRef = doc(db, "users", currentUser.id);

      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          if (!snap.exists()) throw "User does not exist!";
          
          const userData = snap.data();
          const currentCredit = userData.credit || 0;
          const currentRunIndex = userData.runIndex || 0;

          if (currentCredit < p.productPrice) throw "Credit insufficient!";

          let calculatedCredit = currentCredit + p.commission; 

          const updatePayload = {
            credit: calculatedCredit,
            runIndex: currentRunIndex + 1
          };

          transaction.update(userDocRef, updatePayload);

          if (p.type === 'order') {
            transaction.update(doc(db, "orders", p.id), { status: 'completed' });
          } else {
            const newOrderRef = doc(collection(db, "orders"));
            transaction.set(newOrderRef, {
              type: 'order',
              id: newOrderRef.id,
              userId: userData.id,
              username: userData.username || 'User',
              productName: p.productName,
              productPrice: p.productPrice,
              commission: p.commission,
              productImage: p.productImage || '',
              status: 'completed',
              isSpecial: isSpecial,
              createdAt: new Date().toISOString()
            });
          }

          if (isSpecial) {
            const assignment = userSpecialAssignData.find(s => s.targetUser === userData.id && Number(s.targetIndex) === (currentRunIndex + 1));
            if (assignment) {
              transaction.delete(doc(db, "special_assignments", assignment.__backendId));
            }
          }
        });

        showModal(`
          <div class="text-center py-4">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-emerald-100"><i data-lucide="check-circle" class="w-12 h-12"></i></div>
            <h3 class="text-lg font-black text-emerald-600 mb-1">Task Completed</h3>
            <p class="text-slate-500 text-xs font-medium">Your commission has been credited successfully.</p>
            <button onclick="closeModal(); lastRenderedTab=''; renderTabContent();" class="mt-6 w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl transition shadow-md text-base">Continue</button>
          </div>`);

      } catch (err) {
        showToast('Error processing order flow', 'error');
        closeModal();
      }
    }

    function switchHistoryTab(tab) { historyTab = tab; if($('history-container')) $('history-container').remove(); renderHistory($('dash-content')); }

    function renderHistory(c) {
      const u = currentUser; let listHtml = '';
      const done = u.runIndex || 0;
      const userLevel = u.userLevel || '1';
      const creditVal = u.credit || 0;
      
      if (historyTab === 'orders') {
        const orders = getUserOrders().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        const totalVipProducts = getProducts().filter(p => String(p.vipLevel) === String(userLevel)).length;
        const isAllDone = done >= totalVipProducts && totalVipProducts > 0;
        const pendingOrder = orders.find(o => o.status === 'pending');
        let seenOrderIds = new Set();
        const completedOrders = orders.filter(o => { if (o.status !== 'pending' && o.status !== undefined && !seenOrderIds.has(o.id)) { seenOrderIds.add(o.id); return true; } return false; }); 
        const allCompleted = [...completedOrders, ...orders.filter(o => o.status === undefined && !seenOrderIds.has(o.id))];
        let html = '';
        
        if (pendingOrder) { 
          html += `
          <div class="bg-amber-50/50 p-5 rounded-[28px] shadow-sm border border-amber-200/60 mb-5 relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-bl-2xl">Pending Payment</div>
            <div class="flex items-center gap-4 mb-4 mt-2">
              <div class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center flex-shrink-0 overflow-hidden border border-slate-100 p-1">
                ${pendingOrder.productImage ? `<img src="${pendingOrder.productImage}" class="w-full h-full object-contain">` : `<i data-lucide="package" class="w-8 h-8 text-slate-300"></i>`}
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-slate-800 line-clamp-2 text-sm leading-snug">${pendingOrder.productName}</p>
                <p class="text-xs text-slate-400 mt-1 font-semibold">${new Date(pendingOrder.createdAt).toLocaleString()}</p>
              </div>
            </div>
            <div class="bg-white p-3.5 rounded-xl border border-slate-100 mb-4">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-400">Product Price</span>
                <span class="font-black text-slate-800 text-sm">฿${(pendingOrder.productPrice||0).toLocaleString()}</span>
              </div>
              <div class="flex justify-between items-center border-t border-slate-100 pt-2 mt-2">
                <span class="text-xs font-bold text-emerald-600">Commission</span>
                <span class="font-black text-emerald-600 text-sm">+฿${(pendingOrder.commission||0).toLocaleString()}</span>
              </div>
            </div>
            <button id="btn-pay-pending" onclick="if(!isOrderProcessing){ isOrderProcessing=true; this.disabled=true; this.innerHTML='Processing...'; processOrderFlowStep2('${pendingOrder.__backendId}', ${pendingOrder.isSpecial});}" class="w-full py-3.5 bg-slate-900 hover:bg-black text-white font-bold rounded-2xl shadow transition text-base">Settle Pending Order</button>
          </div>`; 
        }
        if (allCompleted.length === 0 && !pendingOrder) {
          html += '<div class="text-center text-slate-400 py-12 font-medium text-sm">No tasks recorded</div>';
        } else { 
          html += allCompleted.map(o => { 
            const statusConfig = isAllDone ? { text: 'Completed', bg: 'bg-emerald-500/15 text-emerald-600 border border-emerald-100' } : { text: 'Processing', bg: 'bg-amber-500/15 text-amber-600 border border-amber-100' }; 
            return `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 mb-3 relative hover:shadow-md transition">
              <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center flex-shrink-0 overflow-hidden p-1 border border-slate-100">
                ${o.productImage ? `<img src="${o.productImage}" class="w-full h-full object-contain">` : `<i data-lucide="package" class="w-6 h-6 text-slate-300"></i>`}
              </div>
              <div class="flex-1 min-w-0 pr-12">
                <p class="font-bold text-slate-800 truncate text-xs">${o.productName}</p>
                <p class="text-xs text-slate-400 mt-0.5 font-semibold">${new Date(o.createdAt).toLocaleString()}</p>
                <div class="mt-1"><span class="inline-block text-xs font-bold px-2 py-0.5 rounded-full ${statusConfig.bg}">${statusConfig.text}</span></div>
              </div>
              <div class="text-right flex-shrink-0">
                <p class="font-bold text-slate-800 text-sm">฿${(o.productPrice||0).toLocaleString()}</p>
                <p class="text-xs text-emerald-500 font-bold">+฿${(o.commission||0).toLocaleString()}</p>
              </div>
            </div>`; 
          }).join(''); 
        }
        listHtml = html;
      } else {
        const wds = getUserWithdrawals().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        listHtml = wds.length === 0 ? '<div class="text-center text-slate-400 py-12 font-medium text-sm">No transaction records</div>' : wds.map(w => { 
          let sc = { color: 'text-slate-500', text: 'Unknown' }; 
          if (w.status === 'deposit') sc = { color: 'text-emerald-600 bg-emerald-50 border border-emerald-100', text: 'Deposit' }; 
          else if (w.status === 'pending') sc = { color: 'text-amber-600 bg-amber-50 border border-amber-100', text: 'Pending' }; 
          else if (w.status === 'approved') sc = { color: 'text-blue-600 bg-blue-50 border border-blue-100', text: 'Approved' }; 
          else if (w.status === 'rejected') sc = { color: 'text-rose-500 bg-rose-50 border border-rose-100', text: 'Rejected' }; 
          
          const isDeposit = w.status === 'deposit';
          const amtContainerClass = isDeposit ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-600' : 'bg-slate-100 border-slate-200 text-slate-800';

          return `
          <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between mb-3.5 hover:shadow-md transition duration-200">
            <div class="space-y-2">
              <span class="px-3.5 py-1.5 rounded-xl text-xs font-bold ${sc.color} inline-block">${sc.text}</span>
              <p class="text-[11px] text-slate-400 font-bold block">${new Date(w.createdAt).toLocaleString()}</p>
            </div>
            <div class="text-right">
              <div class="inline-flex flex-col items-end px-4 py-2 rounded-2xl border ${amtContainerClass} min-w-[120px]">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Amount</span>
                <span class="font-black text-base">฿${(w.amount||0).toLocaleString()}</span>
              </div>
            </div>
          </div>`; 
        }).join('');
      }
      
      if ($('history-container') && $('hist-tab-state').value === historyTab) { 
        if ($('hist-credit-display')) $('hist-credit-display').innerText = '฿' + creditVal.toLocaleString(); 
        if ($('hist-list-container')) $('hist-list-container').innerHTML = listHtml; 
        lucide.createIcons(); 
        return; 
      }
      
      c.innerHTML = `
        <div id="history-container" class="p-4 fade-in">
          <input type="hidden" id="hist-tab-state" value="${historyTab}">
          <div class="bg-theme-gradient text-white rounded-[32px] p-5 mb-5 shadow-lg relative overflow-hidden">
            <div class="absolute right-0 top-0 opacity-10"><i data-lucide="wallet" class="w-32 h-32 -mt-4 -mr-4"></i></div>
            <div class="relative z-10">
              <p class="text-white/70 text-xs font-semibold mb-1 uppercase tracking-wide">Wallet Balance</p>
              <p id="hist-credit-display" class="text-2xl font-black tracking-tight">฿${creditVal.toLocaleString()}</p>
            </div>
          </div>
          <h2 class="text-base font-bold text-slate-800 mb-4 px-1.5 flex items-center gap-2"><i data-lucide="activity" class="text-primary"></i> Activity Log</h2>
          <div class="flex bg-slate-200/60 p-1 rounded-2xl mb-5">
            <button onclick="switchHistoryTab('orders')" class="flex-1 py-3 rounded-xl font-bold text-sm transition ${historyTab === 'orders' ? 'bg-white text-primary shadow-sm' : 'text-slate-500 hover:text-slate-700'}">Orders</button>
            <button onclick="switchHistoryTab('transactions')" class="flex-1 py-3 rounded-xl font-bold text-sm transition ${historyTab === 'transactions' ? 'bg-white text-primary shadow-sm' : 'text-slate-500 hover:text-slate-700'}">Transactions</button>
          </div>
          <div id="hist-list-container">${listHtml}</div>
        </div>`;
      lucide.createIcons();
    }

    function renderProfile(c) {
      const u = currentUser;
      const creditVal = u.credit || 0;
      const usernameVal = u.username || 'User';
      const userLevel = u.userLevel || '1';
      
      if ($('profile-container')) { if ($('prof-credit-display')) $('prof-credit-display').innerText = '฿' + creditVal.toLocaleString(); return; }
      const logoUrl = getLogoUrl(); 
      let levelText = 'VIP ' + userLevel; 
      if(userLevel === 'fixturn') levelText = 'Turnover Repair'; 
      if(userLevel === 'allowwd') levelText = 'Unblocked';

      const levelBadgeHtml = (userLevel === 'allowwd')
        ? ''
        : `<span class="inline-block mt-3 px-4 py-1.5 bg-amber-50 text-amber-600 text-xs font-bold rounded-full border border-amber-200 shadow-sm">⭐ ${levelText}</span>`;

      c.innerHTML = `
        <div id="profile-container" class="p-4 space-y-5 fade-in">
          <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 text-center relative overflow-hidden">
            <div class="w-20 h-20 rounded-[28px] mx-auto overflow-hidden mt-2 flex items-center justify-center bg-slate-50 border border-slate-100">
              ${logoUrl ? `<img src="${logoUrl}" class="app-logo-img w-full h-full object-cover rounded-[28px] cursor-pointer" onclick="handleLogoClick()">` : `<div class="w-20 h-20 bg-blue-50 text-primary rounded-[28px] flex items-center justify-center cursor-pointer" onclick="handleLogoClick()"><i data-lucide="user" class="w-10 h-10"></i></div>`}
            </div>
            <h3 class="font-black text-xl text-slate-800 mt-3">${usernameVal}</h3>
            <p class="text-slate-400 text-sm mt-1 font-semibold">📞 ${u.phone}</p>
            ${levelBadgeHtml}
            <div class="mt-5 pt-4 border-t border-slate-100 text-center">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1">Wallet Balance</p>
              <p id="prof-credit-display" class="text-2xl font-black text-primary">฿${creditVal.toLocaleString()}</p>
            </div>
          </div>
          <div class="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-bold text-slate-800 flex items-center gap-2 text-sm"><i data-lucide="credit-card" class="w-5 h-5 text-primary stroke-[2.2]"></i> Receiving Bank Account</h3>
              <button onclick="showEditBank()" class="text-xs text-primary font-bold bg-blue-50 px-3.5 py-1.5 rounded-xl hover:bg-blue-100 transition">Edit Bank</button>
            </div>
            ${u.bankName ? `
              <div class="bg-slate-50/50 p-4 rounded-2xl border border-slate-200/50">
                <p class="text-xs text-slate-400 font-semibold mb-1 uppercase">Bank</p>
                <p class="font-bold text-slate-800 mb-3 text-sm">${u.bankName}</p>
                <p class="text-xs text-slate-400 font-semibold mb-1 uppercase">Account Number</p>
                <p class="font-mono text-base text-slate-700 tracking-wider font-bold">${u.bankNumber}</p>
              </div>` : `
              <div class="bg-rose-50/40 p-4 rounded-2xl border border-rose-100 text-center">
                <p class="text-rose-500 font-bold text-xs">No bank details added yet</p>
              </div>`}
          </div>
          <div class="space-y-3 pt-2">
            <button onclick="showTopupModal()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-md flex justify-center items-center gap-2 text-base hover:bg-emerald-600 transition">Deposit</button>
            <button onclick="showWithdrawModal()" class="w-full py-4 bg-theme-gradient text-white rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2 text-base hover:opacity-95 transition">Withdraw</button>
            <button onclick="showSupportModal()" class="w-full py-4 bg-white text-slate-700 rounded-2xl font-bold shadow-sm border border-slate-100 flex justify-center items-center gap-2 text-base hover:bg-slate-50 transition">Contact Support</button>
          </div>
        </div>`;
      lucide.createIcons();
    }

    function showEditBank() {
      const u = currentUser;
      const cfg = getConfig();
      const bankString = cfg.supportedBanks || 'KBank,SCB,BBL,KTB,Krungsri,GSB,TrueMoney';
      const bankList = bankString.split(',').map(b => b.trim()).filter(Boolean);

      showModal(`
        <h3 class="font-bold text-lg mb-4 text-slate-800">Bank Details</h3>
        <select id="inp-bank" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-3 outline-none text-slate-700 font-medium text-sm">
          <option value="" disabled ${!u.bankName ? 'selected' : ''}>-- Select Bank --</option>
          ${bankList.map(bank => `<option value="${bank}" ${u.bankName===bank?'selected':''}>${bank}</option>`).join('')}
        </select>
        <input id="inp-bank-num" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-5 outline-none font-semibold text-sm" placeholder="Account Number" value="${u.bankNumber||''}">
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200">Cancel</button>
          <button onclick="saveBank()" class="flex-1 py-3 bg-primary text-white rounded-2xl font-bold shadow-md">Save Settings</button>
        </div>`);
    }

    async function saveBank() {
      const bankName = $('inp-bank').value; if (!bankName) return showToast('Please select bank', 'error');
      const bankNum = $('inp-bank-num').value.trim(); if (!bankNum) return showToast('Please fill account number', 'error');
      currentUser.bankName = bankName; currentUser.bankNumber = bankNum;
      
      let userDocRef = doc(db, "users", currentUser.id);
      await setDoc(userDocRef, currentUser);
      showToast('Settings saved successfully!'); closeModal(); if($('profile-container')) $('profile-container').remove(); renderProfile($('dash-content')); 
    }

    function showWithdrawModal() {
      const u = currentUser;
      const creditVal = u.credit || 0;
      if (!u.bankName || !u.bankNumber) return showToast('Please add bank details first','error');
      if (getUserOrders().find(o => o.status === 'pending')) return showToast('Unable to withdraw while an order is pending','error');
      showModal(`
        <div class="text-center">
          <div class="w-16 h-16 bg-blue-50 text-primary rounded-3xl flex items-center justify-center mx-auto mb-2 border border-blue-100"><i data-lucide="arrow-down-to-line" class="w-8 h-8"></i></div>
          <h3 class="font-bold text-lg text-slate-800 mb-1">Withdraw Funds</h3>
          <p class="text-xs text-slate-500 mb-5">Withdrawable: <span class="font-bold text-primary">฿${creditVal.toLocaleString()}</span></p>
          <input id="inp-wd-amount" type="number" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-3 outline-none text-center font-bold text-lg" placeholder="Amount">
          <input id="inp-wd-pin" type="password" class="w-full px-4 py-3 border border-slate-200 bg-slate-50 rounded-2xl mb-6 outline-none text-center tracking-widest font-semibold text-sm" placeholder="6-Digit PIN">
          <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200">Cancel</button>
            <button onclick="doWithdraw()" id="btn-wd" class="flex-1 py-3 bg-primary text-white rounded-2xl font-bold shadow-md">Confirm Withdrawal</button>
          </div>
        </div>`);
    }

    async function doWithdraw() {
      const u = currentUser; const amt = parseFloat($('inp-wd-amount').value); const pin = $('inp-wd-pin').value.trim();
      const creditVal = u.credit || 0;
      const withdrawPassword = u.withdrawPassword;
      const usernameVal = u.username || 'User';
      
      if (!amt || amt <= 0 || creditVal < amt) return showToast('Invalid or insufficient balance','error');
      if (String(pin) !== String(withdrawPassword)) return showToast('Invalid security PIN','error');
      
      $('btn-wd').disabled = true; $('btn-wd').textContent = 'Processing...';
      
      let userDocRef = doc(db, "users", u.id);
      let wdCol = collection(db, "withdrawals");
      try {
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(userDocRef);
          const currentCredit = snap.data().credit || 0;
          if (currentCredit < amt) throw "Insufficient Balance";

          const updatePayload = {
            credit: currentCredit - amt
          };

          transaction.update(userDocRef, updatePayload);
          
          const newWdRef = doc(wdCol);
          transaction.set(newWdRef, {
            type: 'withdrawal',
            id: newWdRef.id,
            userId: u.id,
            username: usernameVal,
            amount: amt,
            bankName: u.bankName,
            bankNumber: u.bankNumber,
            status: 'pending',
            createdAt: new Date().toISOString()
          });
        });

        showToast('Request sent successfully! Pending administrative approval');
        closeModal();
      } catch (err) {
        showToast('Transaction request failed', 'error');
        closeModal();
      }
    }

    // ==========================================
    // WINDOW GLOBAL EXPORTS
    // ==========================================
    window.doLogin = doLogin;
    window.doRegister = doRegister;
    window.showRegisterForm = showRegisterForm;
    window.showLoginForm = showLoginForm;
    window.doLogout = doLogout;
    window.switchTab = switchTab;
    window.showSupportModal = showSupportModal;
    window.showTopupModal = showTopupModal;
    window.showWithdrawModal = showWithdrawModal;
    window.showEditBank = showEditBank;
    window.saveBank = saveBank;
    window.doWithdraw = doWithdraw;
    window.startRun = startRun;
    window.triggerStep1Delay = triggerStep1Delay;
    window.confirmOrderSuccess = confirmOrderSuccess;
    window.processOrderFlowStep2 = processOrderFlowStep2;
    window.switchHistoryTab = switchHistoryTab;
    window.closeModal = closeModal;
    window.openMenuIconPopup = openMenuIconPopup;
    window.handleLogoClick = handleLogoClick;
  </script>
